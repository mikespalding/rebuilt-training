<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:      #21a9e1;
  --teal-dark: #0f696e;
  --orange:    #f5831f;
  --navy:      #1f3540;
  --off-white: #efedeb;
  --white:     #ffffff;
  --muted:     #5a7888;
  --border:    rgba(31,53,64,0.10);
  --pass:      #2ecc71;
  --fail:      #e74c3c;
  --font:      'Montserrat', sans-serif;
}
body { font-family: var(--font); background: var(--off-white); color: var(--navy); min-height: 100vh; }

/* ── HEADER ── */
.site-header {
  background: var(--navy); height: 72px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.22);
}
.header-logo { display: flex; align-items: center; gap: 16px; }
.header-logo img { height: 34px; width: auto; }
.header-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.15); }
.header-title { display: flex; flex-direction: column; gap: 1px; }
.header-title-main { font-size: 15px; font-weight: 800; color: white; line-height: 1; }
.header-title-sub { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.40); letter-spacing: 0.12em; text-transform: uppercase; line-height: 1; }
.header-right { display: flex; align-items: center; gap: 12px; }
.admin-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; background: rgba(220,38,38,0.15); color: #dc2626; }
.btn-refresh {
  font-size: 11px; font-weight: 700; padding: 7px 14px;
  background: rgba(33,169,225,0.15); border: 1px solid rgba(33,169,225,0.3);
  border-radius: 6px; color: var(--blue); cursor: pointer;
  font-family: var(--font); transition: background 0.2s;
}
.btn-refresh:hover { background: rgba(33,169,225,0.25); }

/* ── MAIN ── */
.main-wrap { max-width: 1400px; margin: 0 auto; padding: 36px 24px 80px; }

/* ── SUMMARY STATS ── */
.summary-bar {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 32px;
}
.summary-card {
  background: var(--navy); border-radius: 10px; padding: 18px 20px;
}
.summary-value { font-size: 28px; font-weight: 900; color: white; line-height: 1; margin-bottom: 4px; }
.summary-value.blue   { color: var(--blue); }
.summary-value.green  { color: var(--pass); }
.summary-value.orange { color: var(--orange); }
.summary-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); }

/* ── CONTROLS ── */
.controls {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.filter-btn {
  font-size: 10px; font-weight: 700; padding: 5px 12px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--white); cursor: pointer; font-family: var(--font);
  color: var(--muted); transition: all 0.15s;
}
.filter-btn.active-all   { border-color: var(--navy);  background: var(--navy);  color: white; }
.filter-btn.active-acq   { border-color: var(--blue);  background: var(--blue);  color: white; }
.filter-btn.active-dispo { border-color: var(--orange); background: var(--orange); color: white; }
.search-input {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font); font-size: 12px; color: var(--navy);
  outline: none; width: 200px; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--blue); }
.sort-select {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font); font-size: 12px; color: var(--navy);
  outline: none; background: var(--white); cursor: pointer;
}
.controls-right { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 600; }

/* ── TABLE WRAPPER ── */
.table-wrap {
  background: var(--white); border-radius: 12px;
  border: 1px solid var(--border); overflow: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 11px; }

/* ── COLUMN HEADERS ── */
thead tr { background: var(--navy); }
th {
  padding: 10px 12px; text-align: left;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
  white-space: nowrap; position: sticky; top: 0;
}
th.rep-col { color: white; min-width: 180px; }
th.mod-col {
  text-align: center;
  width: 72px;
  min-width: 72px;
  max-width: 72px;
  padding: 8px 4px;
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 0.06em;
  white-space: normal;
  word-break: break-word;
  line-height: 1.3;
  vertical-align: middle;
  cursor: pointer;
}
th.mod-col:hover { color: rgba(255,255,255,0.9); }
th.mod-col .col-label { display: inline; }

/* module header color by type */
th.kc-header  { border-top: 3px solid var(--teal-dark); }
th.olt-header { border-top: 3px solid var(--orange); }

/* ── ROWS ── */
tbody tr { border-bottom: 1px solid rgba(31,53,64,0.06); transition: background 0.12s; }
tbody tr:hover { background: rgba(33,169,225,0.04); }
tbody tr:last-child { border-bottom: none; }

td { padding: 10px 12px; vertical-align: middle; }
td.rep-cell { min-width: 180px; }

.rep-name { font-size: 12px; font-weight: 700; color: var(--navy); }
.rep-email { font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 1px; }
.rep-role {
  display: inline-block; font-size: 8px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 10px; margin-top: 3px;
}
.rep-role.acq  { background: rgba(33,169,225,0.12); color: #1487b8; }
.rep-role.dispo{ background: rgba(245,131,31,0.12);  color: #c4640a; }

/* progress bar cell */
.prog-cell { min-width: 120px; }
.prog-bar-wrap {
  height: 6px; background: rgba(31,53,64,0.08);
  border-radius: 99px; overflow: hidden; margin-bottom: 3px;
}
.prog-bar-fill { height: 100%; border-radius: 99px; background: var(--blue); }
.prog-text { font-size: 10px; font-weight: 700; color: var(--muted); }

/* module cell */
td.mod-cell { text-align: center; padding: 6px 4px; }
.cell-pass {
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1px;
  width: 64px; height: 40px; border-radius: 6px;
  background: rgba(46,204,113,0.10); border: 1px solid rgba(46,204,113,0.25);
}
.cell-fail {
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1px;
  width: 64px; height: 40px; border-radius: 6px;
  background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.2);
}
.cell-none {
  display: inline-flex; align-items: center; justify-content: center;
  width: 64px; height: 40px; border-radius: 6px;
  background: rgba(31,53,64,0.04); border: 1px solid rgba(31,53,64,0.08);
  color: var(--muted); font-size: 14px;
}
.cell-score { font-size: 11px; font-weight: 800; }
.cell-pass .cell-score  { color: #18924d; }
.cell-fail .cell-score  { color: var(--fail); }
.cell-check { font-size: 9px; }
.cell-pass .cell-check  { color: rgba(46,204,113,0.7); }
.cell-fail .cell-check  { color: rgba(231,76,60,0.6); }

/* ── LOADING / EMPTY ── */
.state-msg {
  text-align: center; padding: 60px 24px;
  font-size: 13px; color: var(--muted); font-style: italic;
}
.spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; }
.spinner {
  width: 20px; height: 20px; border: 2px solid rgba(31,53,64,0.15);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LAST UPDATED ── */
.last-updated { font-size: 10px; color: var(--muted); text-align: right; margin-top: 10px; }

/* ── FOOTER ── */
.site-footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }

@media (max-width: 700px) {
  .main-wrap { padding: 16px 10px 60px; }
  .site-header { padding: 0 16px; }
  .header-title-sub { display: none; }
}
</style>
</head>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbzByXw6HHRYXeENf1mhTd3HqbP23YhnWGkl46rTaZB0g5gv85VdtuFy-TfHkpK5DQ6zfg/exec';

// ── MODULE REGISTRY ──────────────────────────────────────────
const ALL_MODULES = [
  // OLTs first
  { id:'olt_sales_talk',    name:'Sales Talk',       type:'OLT', roles:['acq'] },
  { id:'olt_ab_contract',   name:'AB Contract',      type:'OLT', roles:['acq'] },
  { id:'olt_five9',         name:'Five9',            type:'OLT', roles:['acq'] },
  // KCs
  { id:'kc_intro',          name:'Intro to Rebuilt', type:'KC',  roles:['acq','dispo'] },
  { id:'kc_core_values',    name:'Core Values',      type:'KC',  roles:['acq','dispo'] },
  { id:'kc_marketing',      name:'Marketing',        type:'KC',  roles:['acq','dispo'] },
  { id:'kc_comps_arv',      name:'Comps + ARV',      type:'KC',  roles:['acq'] },
  { id:'kc_dispo_intro',    name:'Intro to Dispo',   type:'KC',  roles:['dispo'] },
  { id:'kc_ur_to_mktg',     name:'UR to Mktg',       type:'KC',  roles:['dispo'] },
  { id:'kc_buyer_sourcing', name:'Buyer Sourcing',   type:'KC',  roles:['dispo'] },
  { id:'kc_buyer_processes',name:'Buyer Processes',  type:'KC',  roles:['dispo'] },
  { id:'kc_c2c_nts',        name:'C2C + NTS',        type:'KC',  roles:['dispo'] },
];

// ── STATE ────────────────────────────────────────────────────
var allData       = [];   // raw completions from sheet
var repMap        = {};  // email → { name, role, completions: {mod_id: record} }
var currentFilter = 'all';

// ── LOAD ─────────────────────────────────────────────────────
function loadData() {
  document.getElementById('table-container').innerHTML =
    '<div class="state-msg"><div class="spinner-wrap"><div class="spinner"></div><span>Loading…</span></div></div>';

  var cbName = 'adm_cb_' + Date.now();
  var timer  = setTimeout(function() {
    delete window[cbName];
    var s = document.getElementById('s_' + cbName);
    if (s) s.remove();
    document.getElementById('table-container').innerHTML =
      '<div class="state-msg">Could not load data — check Apps Script deployment.</div>';
  }, 10000);

  window[cbName] = function(data) {
    clearTimeout(timer);
    delete window[cbName];
    var s = document.getElementById('s_' + cbName);
    if (s) s.remove();
    processData(data);
  };

  var tag  = document.createElement('script');
  tag.id   = 's_' + cbName;
  tag.src  = APPS_URL + '?mode=admin&callback=' + cbName;
  tag.onerror = function() {
    clearTimeout(timer);
    delete window[cbName];
    document.getElementById('table-container').innerHTML =
      '<div class="state-msg">Failed to reach Apps Script.</div>';
  };
  document.head.appendChild(tag);
}

// ── PROCESS DATA ─────────────────────────────────────────────
function processData(data) {
  allData = (data && data.completions) ? data.completions : [];
  repMap  = {};

  allData.forEach(function(c) {
    var email = (c.email || '').toLowerCase().trim();
    if (!email) return;

    if (!repMap[email]) {
      var namePart = email.split('@')[0].replace(/[._]/g,' ')
        .replace(/(^\w|\s\w)/g, function(m) { return m.toUpperCase(); });
      repMap[email] = { name: namePart, email: email, role: c.role || '', completions: {} };
    } else if (c.role && !repMap[email].role) {
      repMap[email].role = c.role;
    }

    var rec = repMap[email];
    // Keep best score per module
    if (!rec.completions[c.module_id] || c.score_pct > rec.completions[c.module_id].score_pct) {
      rec.completions[c.module_id] = c;
    }
  });

  // Role: read directly from sheet data (column H), fallback to inference
  Object.values(repMap).forEach(function(rep) {
    // If any completion row has a role set, use it
    var roleFromSheet = '';
    allData.forEach(function(c) {
      if ((c.email || '').toLowerCase().trim() === rep.email && c.role) {
        roleFromSheet = c.role;
      }
    });
    if (roleFromSheet === 'acq' || roleFromSheet === 'dispo') {
      rep.role = roleFromSheet;
    } else {
      // Fallback inference for rows without role column populated
      var dispoMods = ['kc_dispo_intro','kc_ur_to_mktg','kc_buyer_sourcing','kc_buyer_processes','kc_c2c_nts'];
      var acqMods   = ['olt_sales_talk','olt_ab_contract','olt_five9'];
      var hasDispoOnly = dispoMods.some(function(id) { return rep.completions[id]; });
      var hasAcqOnly   = acqMods.some(function(id)   { return rep.completions[id]; });
      rep.role = (hasDispoOnly && !hasAcqOnly) ? 'dispo' : 'acq';
    }
  });

  // Populate assoc dropdown
  var assocSel = document.getElementById('assoc-filter');
  var current  = assocSel.value;
  assocSel.innerHTML = '<option value="">All Associates</option>';
  Object.values(repMap).sort(function(a,b){ return a.name.localeCompare(b.name); }).forEach(function(rep) {
    var opt = document.createElement('option');
    opt.value = rep.email;
    opt.textContent = rep.name;
    if (rep.email === current) opt.selected = true;
    assocSel.appendChild(opt);
  });

  document.getElementById('last-updated').textContent =
    'Last refreshed: ' + new Date().toLocaleTimeString();

  updateSummary();
  renderTable();
  populateAssocDropdown();
}

// ── SUMMARY STATS ────────────────────────────────────────────
function updateSummary() {
  var reps     = Object.values(repMap);
  var total    = reps.length;
  var allComps = 0, allPasses = 0, scoreSum = 0, scoreCount = 0, fullCount = 0;

  reps.forEach(function(rep) {
    var myMods = ALL_MODULES.filter(function(m) { return m.roles.includes(rep.role || 'acq'); });
    var comp   = Object.values(rep.completions).length;
    var passed = Object.values(rep.completions).filter(function(c) { return c.passed; }).length;
    allComps  += comp;
    allPasses += passed;
    Object.values(rep.completions).forEach(function(c) {
      if (c.score_pct > 0) { scoreSum += parseFloat(c.score_pct); scoreCount++; }
    });
    if (comp >= myMods.length && myMods.length > 0) fullCount++;
  });

  document.getElementById('s-reps').textContent        = total;
  document.getElementById('s-completions').textContent = allComps;
  document.getElementById('s-passes').textContent      = allPasses;
  document.getElementById('s-avg').textContent         = scoreCount > 0 ? Math.round(scoreSum/scoreCount) + '%' : '—';
  document.getElementById('s-full').textContent        = fullCount;
}

// ── FILTER ───────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  ['all','acq','dispo'].forEach(function(x) {
    var btn = document.getElementById('f-' + x);
    btn.className = 'filter-btn' + (x === f ? ' active-' + f : '');
  });
  renderTable();
}

// ── RENDER TABLE ─────────────────────────────────────────────
function renderTable() {
  var search     = (document.getElementById('search-input').value || '').toLowerCase();
  var assocPick  = document.getElementById('assoc-filter').value;
  var sort   = document.getElementById('sort-select').value;

  var reps = Object.values(repMap).filter(function(rep) {
    if (currentFilter !== 'all' && rep.role !== currentFilter) return false;
    if (search && !rep.name.toLowerCase().includes(search) && !rep.email.includes(search)) return false;
    if (assocPick && rep.email !== assocPick) return false;
    return true;
  });

  // Sort
  reps.sort(function(a, b) {
    if (sort === 'name') return a.name.localeCompare(b.name);
    var pctA = getCompPct(a), pctB = getCompPct(b);
    return sort === 'pct-desc' ? pctB - pctA : pctA - pctB;
  });

  document.getElementById('rep-count').textContent = reps.length + ' rep' + (reps.length !== 1 ? 's' : '');

  if (reps.length === 0) {
    document.getElementById('table-container').innerHTML =
      '<div class="state-msg">No reps found' + (allData.length === 0 ? ' — no data in sheet yet.' : '.') + '</div>';
    return;
  }

  // Determine which modules to show based on active filter
  var visibleMods = ALL_MODULES.filter(function(m) {
    if (currentFilter === 'acq')   return m.roles.includes('acq');
    if (currentFilter === 'dispo') return m.roles.includes('dispo');
    return true;
  });

  // Build header
  var thead = '<thead><tr><th class="rep-col">Associate</th><th>Progress</th>';
  visibleMods.forEach(function(m) {
    var cls = m.type === 'OLT' ? 'olt-header' : 'kc-header';
    thead += '<th class="mod-col ' + cls + '"><span class="mod-header-inner">' + m.name + '</span></th>';
  });
  thead += '</tr></thead>';

  // Build rows
  var tbody = '<tbody>';
  reps.forEach(function(rep) {
    var myMods = ALL_MODULES.filter(function(m) { return m.roles.includes(rep.role || 'acq'); });
    var compCount = myMods.filter(function(m) { return rep.completions[m.id] && rep.completions[m.id].passed; }).length;
    var pct = myMods.length > 0 ? Math.round((compCount / myMods.length) * 100) : 0;

    tbody += '<tr>';
    tbody += '<td class="rep-cell">';
    tbody += '<div class="rep-name">' + rep.name + '</div>';
    tbody += '<div class="rep-email">' + rep.email + '</div>';
    tbody += '<span class="rep-role ' + rep.role + '">' + (rep.role === 'acq' ? 'Acquisition' : 'Disposition') + '</span>';
    tbody += '</td>';

    // Progress bar
    tbody += '<td class="prog-cell">';
    tbody += '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:' + pct + '%"></div></div>';
    tbody += '<div class="prog-text">' + compCount + ' / ' + myMods.length + ' passed (' + pct + '%)</div>';
    tbody += '</td>';

    // Module cells
    visibleMods.forEach(function(m) {
      var c = rep.completions[m.id];
      // Only show cell if this module is relevant to rep's role
      if (!m.roles.includes(rep.role || 'acq')) {
        tbody += '<td class="mod-cell"><span class="cell-none" style="opacity:0.3">—</span></td>';
        return;
      }
      if (!c) {
        tbody += '<td class="mod-cell"><span class="cell-none">—</span></td>';
      } else if (c.passed) {
        tbody += '<td class="mod-cell"><span class="cell-pass"><span class="cell-score">' + Math.round(c.score_pct) + '%</span><span class="cell-check">✓ Pass</span></span></td>';
      } else {
        tbody += '<td class="mod-cell"><span class="cell-fail"><span class="cell-score">' + Math.round(c.score_pct) + '%</span><span class="cell-check">✗ Retry</span></span></td>';
      }
    });

    tbody += '</tr>';
  });
  tbody += '</tbody>';

  document.getElementById('table-container').innerHTML =
    '<table>' + thead + tbody + '</table>';
}

function getCompPct(rep) {
  var myMods = ALL_MODULES.filter(function(m) { return m.roles.includes(rep.role || 'acq'); });
  if (!myMods.length) return 0;
  var passed = myMods.filter(function(m) { return rep.completions[m.id] && rep.completions[m.id].passed; }).length;
  return Math.round((passed / myMods.length) * 100);
}

function populateAssocDropdown() {
  var sel = document.getElementById('assoc-select');
  var current = sel.value;
  // Keep first "All Associates" option
  while (sel.options.length > 1) sel.remove(1);
  var reps = Object.values(repMap).sort(function(a,b) { return a.name.localeCompare(b.name); });
  reps.forEach(function(rep) {
    var opt = document.createElement('option');
    opt.value = rep.email;
    opt.textContent = rep.name;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function onAssocSelect() {
  // When an assoc is selected from dropdown, sync search field and re-render
  var sel = document.getElementById('assoc-select');
  var searchEl = document.getElementById('search-input');
  if (sel.value) {
    searchEl.value = sel.value; // filter by email
  } else {
    searchEl.value = '';
  }
  renderTable();
}

function onSearchInput() {
  // When typing in search, reset dropdown to "All"
  var sel = document.getElementById('assoc-select');
  sel.value = '';
  renderTable();
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);
</script>

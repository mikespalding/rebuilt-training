<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:      #21a9e1;
  --teal-dark: #0f696e;
  --orange:    #f5831f;
  --navy:      #1f3540;
  --off-white: #efedeb;
  --white:     #ffffff;
  --muted:     #5a7888;
  --border:    rgba(31,53,64,0.10);
  --pass:      #2ecc71;
  --fail:      #e74c3c;
  --font:      'Montserrat', sans-serif;
}
body { font-family: var(--font); background: var(--off-white); color: var(--navy); min-height: 100vh; }

/* ── HEADER ── */
.site-header {
  background: var(--navy); height: 72px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.22);
}
.header-logo { display: flex; align-items: center; gap: 16px; }
.header-logo img { height: 34px; width: auto; }
.header-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.15); }
.header-title { display: flex; flex-direction: column; gap: 1px; }
.header-title-main { font-size: 15px; font-weight: 800; color: white; line-height: 1; }
.header-title-sub { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.40); letter-spacing: 0.12em; text-transform: uppercase; line-height: 1; }
.header-right { display: flex; align-items: center; gap: 12px; }
.admin-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; background: rgba(220,38,38,0.15); color: #dc2626; }
.btn-refresh {
  font-size: 11px; font-weight: 700; padding: 7px 14px;
  background: rgba(33,169,225,0.15); border: 1px solid rgba(33,169,225,0.3);
  border-radius: 6px; color: var(--blue); cursor: pointer;
  font-family: var(--font); transition: background 0.2s;
}
.btn-refresh:hover { background: rgba(33,169,225,0.25); }

/* ── MAIN ── */
.main-wrap { max-width: 1400px; margin: 0 auto; padding: 36px 24px 80px; }



/* ── CONTROLS ── */
.controls {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.filter-btn {
  font-size: 10px; font-weight: 700; padding: 5px 12px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--white); cursor: pointer; font-family: var(--font);
  color: var(--muted); transition: all 0.15s;
}
.filter-btn.active-all   { border-color: var(--navy);  background: var(--navy);  color: white; }
.filter-btn.active-acq   { border-color: var(--blue);  background: var(--blue);  color: white; }
.filter-btn.active-dispo { border-color: var(--orange); background: var(--orange); color: white; }

.sort-select {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font); font-size: 12px; color: var(--navy);
  outline: none; background: var(--white); cursor: pointer;
}
.class-select {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font); font-size: 12px; color: var(--navy);
  outline: none; background: var(--white); cursor: pointer; min-width: 160px;
}
.class-select:focus { border-color: var(--blue); outline: none; }

/* ── MULTI-SELECT ASSOC ── */
.ms-wrap { position: relative; }
.ms-trigger {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font); font-size: 12px; color: var(--navy);
  background: var(--white); cursor: pointer;
  min-width: 220px; display: flex; align-items: center; gap: 6px;
  user-select: none;
}
.ms-trigger:hover { border-color: var(--blue); }
.ms-trigger.open  { border-color: var(--blue); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
.ms-trigger-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ms-caret { font-size: 8px; color: var(--muted); flex-shrink: 0; transition: transform 0.15s; }
.ms-trigger.open .ms-caret { transform: rotate(180deg); }
.ms-clear { font-size: 11px; color: var(--muted); cursor: pointer; flex-shrink: 0; padding: 0 2px; }
.ms-clear:hover { color: var(--fail); }
.ms-dropdown {
  display: none; position: absolute; top: 100%; left: 0; z-index: 200;
  background: var(--white); border: 1.5px solid var(--blue);
  border-top: none; border-radius: 0 0 8px 8px;
  min-width: 100%; max-height: 240px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(31,53,64,0.12);
}
.ms-wrap.is-open .ms-dropdown { display: block; }
.ms-search {
  padding: 8px 10px; border: none; border-bottom: 1px solid var(--border);
  font-family: var(--font); font-size: 11px; width: 100%; outline: none; color: var(--navy);
}
.ms-option {
  padding: 8px 12px; font-size: 11px; color: var(--navy); cursor: pointer;
  display: flex; align-items: center; gap: 8px; transition: background 0.1s;
}
.ms-option:hover { background: rgba(33,169,225,0.06); }
.ms-option.selected { background: rgba(33,169,225,0.10); }
.ms-option input[type=checkbox] { accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }
.ms-option-label { flex: 1; }
.ms-option-role {
  font-size: 8px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 8px;
}
.ms-option-role.acq   { background: rgba(33,169,225,0.12); color: #1487b8; }
.ms-option-role.dispo { background: rgba(245,131,31,0.12);  color: #c4640a; }
.ms-empty { padding: 10px 12px; font-size: 11px; color: var(--muted); font-style: italic; }
.controls-right { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 600; }

/* ── TABLE WRAPPER ── */
.table-wrap {
  background: var(--white); border-radius: 12px;
  border: 1px solid var(--border); overflow: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 11px; }

/* ── COLUMN HEADERS ── */
thead tr { background: var(--navy); }
th {
  padding: 10px 12px; text-align: left;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
  white-space: nowrap; position: sticky; top: 0; z-index: 1;
}
th.rep-col {
  color: white; min-width: 180px;
  position: sticky; top: 0; left: 0; z-index: 3;
  background: var(--navy);
  box-shadow: 2px 0 0 rgba(255,255,255,0.08);
}
th.prog-col {
  position: sticky; top: 0; left: 180px; z-index: 3;
  background: var(--navy); min-width: 140px;
  box-shadow: 2px 0 6px rgba(0,0,0,0.18);
}
th.mod-col {
  text-align: center;
  width: 72px;
  min-width: 72px;
  max-width: 72px;
  padding: 8px 4px;
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 0.06em;
  white-space: normal;
  word-break: break-word;
  line-height: 1.3;
  vertical-align: middle;
  cursor: pointer;
}
th.mod-col:hover { color: rgba(255,255,255,0.9); }
th.mod-col .col-label { display: inline; }

/* module header color by type */
th.kc-header  { border-top: 3px solid var(--teal-dark); }
th.olt-header { border-top: 3px solid var(--orange); }

/* ── ROWS ── */
tbody tr { border-bottom: 1px solid rgba(31,53,64,0.06); transition: background 0.12s; }
tbody tr:hover { background: rgba(33,169,225,0.04); }
tbody tr:hover td.rep-cell,
tbody tr:hover td.prog-cell { background: #eaf7fd; }
tbody tr:last-child { border-bottom: none; }

td { padding: 10px 12px; vertical-align: middle; }
td.rep-cell {
  min-width: 180px;
  position: sticky; left: 0; z-index: 2;
  background: var(--white);
  box-shadow: 2px 0 0 rgba(31,53,64,0.06);
}

.rep-name { font-size: 12px; font-weight: 700; color: var(--navy); }
.rep-email { font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 1px; }
.rep-role {
  display: inline-block; font-size: 8px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 10px; margin-top: 3px;
}
.rep-role.acq  { background: rgba(33,169,225,0.12); color: #1487b8; }
.rep-role.dispo{ background: rgba(245,131,31,0.12);  color: #c4640a; }

/* progress bar cell */
.prog-cell {
  min-width: 140px;
  position: sticky; left: 180px; z-index: 2;
  background: var(--white);
  box-shadow: 2px 0 6px rgba(31,53,64,0.08);
}
.prog-bar-wrap {
  height: 6px; background: rgba(31,53,64,0.08);
  border-radius: 99px; overflow: hidden; margin-bottom: 3px;
}
.prog-bar-fill { height: 100%; border-radius: 99px; background: var(--blue); }
.prog-text { font-size: 10px; font-weight: 700; color: var(--muted); }

/* module cell */
td.mod-cell { text-align: center; padding: 6px 4px; }
.cell-pass {
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1px;
  width: 64px; height: 40px; border-radius: 6px;
  background: rgba(46,204,113,0.10); border: 1px solid rgba(46,204,113,0.25);
}
.cell-fail {
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1px;
  width: 64px; height: 40px; border-radius: 6px;
  background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.2);
}
.cell-none {
  display: inline-flex; align-items: center; justify-content: center;
  width: 64px; height: 40px; border-radius: 6px;
  background: rgba(31,53,64,0.04); border: 1px solid rgba(31,53,64,0.08);
  color: var(--muted); font-size: 14px;
}
.cell-score { font-size: 11px; font-weight: 800; }
.cell-pass .cell-score  { color: #18924d; }
.cell-fail .cell-score  { color: var(--fail); }
.cell-check { font-size: 9px; }
.cell-pass .cell-check  { color: rgba(46,204,113,0.7); }
.cell-fail .cell-check  { color: rgba(231,76,60,0.6); }

/* ── LOADING / EMPTY ── */
.state-msg {
  text-align: center; padding: 60px 24px;
  font-size: 13px; color: var(--muted); font-style: italic;
}
.spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; }
.spinner {
  width: 20px; height: 20px; border: 2px solid rgba(31,53,64,0.15);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LAST UPDATED ── */
.last-updated { font-size: 10px; color: var(--muted); text-align: right; margin-top: 10px; }

/* ── FOOTER ── */
.site-footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }

@media (max-width: 700px) {
  .main-wrap { padding: 16px 10px 60px; }
  .site-header { padding: 0 16px; }
  .header-title-sub { display: none; }
}
</style>
</head>

// ── LOAD ─────────────────────────────────────────────────────
function loadData() {
  document.getElementById('table-container').innerHTML =
    '<div class="state-msg"><div class="spinner-wrap"><div class="spinner"></div><span>Loading…</span></div></div>';

  var cbName = 'adm_cb_' + Date.now();
  var timer  = setTimeout(function() {
    delete window[cbName];
    var s = document.getElementById('s_' + cbName);
    if (s) s.remove();
    document.getElementById('table-container').innerHTML =
      '<div class="state-msg">Could not load data — check Apps Script deployment.</div>';
  }, 10000);

  window[cbName] = function(data) {
    clearTimeout(timer);
    delete window[cbName];
    var s = document.getElementById('s_' + cbName);
    if (s) s.remove();
    processData(data);
  };

  var tag  = document.createElement('script');
  tag.id   = 's_' + cbName;
  tag.src  = APPS_URL + '?mode=admin&callback=' + cbName;
  tag.onerror = function() {
    clearTimeout(timer);
    delete window[cbName];
    document.getElementById('table-container').innerHTML =
      '<div class="state-msg">Failed to reach Apps Script.</div>';
  };
  document.head.appendChild(tag);
}

// ── PROCESS DATA ─────────────────────────────────────────────
function processData(data) {
  allData = (data && data.completions) ? data.completions : [];
  repMap  = {};

  allData.forEach(function(c) {
    var email = (c.email || '').toLowerCase().trim();
    if (!email) return;

    if (!repMap[email]) {
      var namePart = email.split('@')[0].replace(/[._]/g,' ')
        .replace(/(^\w|\s\w)/g, function(m) { return m.toUpperCase(); });
      repMap[email] = { name: namePart, email: email, role: c.role || '', completions: {} };
    } else if (c.role && !repMap[email].role) {
      repMap[email].role = c.role;
    }

    var rec = repMap[email];
    // Keep best score per module
    if (!rec.completions[c.module_id] || c.score_pct > rec.completions[c.module_id].score_pct) {
      rec.completions[c.module_id] = c;
    }
    // Capture class if set (any row for this rep that has one wins)
    if (c.class && !rec.cls) rec.cls = c.class;
  });

  // Role: read directly from sheet data (column H), fallback to inference
  Object.values(repMap).forEach(function(rep) {
    // If any completion row has a role set, use it
    var roleFromSheet = '';
    allData.forEach(function(c) {
      if ((c.email || '').toLowerCase().trim() === rep.email && c.role) {
        roleFromSheet = c.role;
      }
    });
    if (roleFromSheet === 'acq' || roleFromSheet === 'dispo') {
      rep.role = roleFromSheet;
    } else {
      // Fallback inference for rows without role column populated
      var dispoMods = ['kc_dispo_intro','kc_ur_to_mktg','kc_buyer_sourcing','kc_buyer_processes','kc_c2c_nts'];
      var acqMods   = ['olt_sales_talk','olt_ab_contract','olt_five9','olt_hubspot','kc_c2c_acq'];
      var hasDispoOnly = dispoMods.some(function(id) { return rep.completions[id]; });
      var hasAcqOnly   = acqMods.some(function(id)   { return rep.completions[id]; });
      rep.role = (hasDispoOnly && !hasAcqOnly) ? 'dispo' : 'acq';
    }
  });

  // Refresh multi-select list
  filterMsOptions();

  // Populate class filter dropdown (chronological, Unassigned last)
  var classSel = document.getElementById('class-filter');
  var currentClass = classSel.value;
  classSel.innerHTML = '<option value="">All Classes</option>';

  // Collect unique class values
  var classSet = {};
  Object.values(repMap).forEach(function(rep) {
    var cls = (rep.cls || '').trim();
    if (cls) classSet[cls] = true;
  });

  // Sort chronologically (parse M/D/YYYY)
  var classVals = Object.keys(classSet).sort(function(a, b) {
    var da = new Date(a), db = new Date(b);
    var va = isNaN(da) ? Infinity : da.getTime();
    var vb = isNaN(db) ? Infinity : db.getTime();
    return va - vb;
  });

  classVals.forEach(function(cls) {
    var opt = document.createElement('option');
    opt.value = cls;
    opt.textContent = cls;
    if (cls === currentClass) opt.selected = true;
    classSel.appendChild(opt);
  });

  // Always add Unassigned option
  var unOpt = document.createElement('option');
  unOpt.value = '__unassigned__';
  unOpt.textContent = 'Unassigned';
  if (currentClass === '__unassigned__') unOpt.selected = true;
  classSel.appendChild(unOpt);

  document.getElementById('last-updated').textContent =
    'Last refreshed: ' + new Date().toLocaleTimeString();

  renderTable();
  populateAssocDropdown();
}


// ── MULTI-SELECT ASSOC ─────────────────────────
var selectedAssocs = new Set();

function toggleMsDropdown() {
  var wrap    = document.getElementById('ms-wrap');
  var trigger = document.getElementById('ms-trigger');
  var isOpen  = wrap.classList.contains('is-open');
  if (isOpen) {
    wrap.classList.remove('is-open');
    trigger.classList.remove('open');
  } else {
    wrap.classList.add('is-open');
    trigger.classList.add('open');
    document.getElementById('ms-search').value = '';
    filterMsOptions();
    document.getElementById('ms-search').focus();
  }
}

document.addEventListener('click', function(e) {
  var wrap = document.getElementById('ms-wrap');
  if (wrap && !wrap.contains(e.target)) {
    wrap.classList.remove('is-open');
    document.getElementById('ms-trigger').classList.remove('open');
  }
});

function filterMsOptions() {
  var q         = (document.getElementById('ms-search').value || '').toLowerCase();
  var container = document.getElementById('ms-options');
  container.innerHTML = '';
  var reps     = Object.values(repMap).sort(function(a,b){ return a.name.localeCompare(b.name); });
  var filtered = q ? reps.filter(function(r){ return r.name.toLowerCase().includes(q) || r.email.includes(q); }) : reps;
  if (filtered.length === 0) {
    container.innerHTML = '<div class="ms-empty">No matches</div>';
    return;
  }
  filtered.forEach(function(rep) {
    var div = document.createElement('div');
    div.className = 'ms-option' + (selectedAssocs.has(rep.email) ? ' selected' : '');
    div.innerHTML =
      '<input type="checkbox" ' + (selectedAssocs.has(rep.email) ? 'checked' : '') + '/>' +
      '<span class="ms-option-label">' + rep.name + '</span>' +
      '<span class="ms-option-role ' + rep.role + '">' + (rep.role === 'acq' ? 'Acq' : 'Dispo') + '</span>';
    div.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleAssoc(rep.email, div);
    });
    container.appendChild(div);
  });
}

function toggleAssoc(email, div) {
  if (selectedAssocs.has(email)) {
    selectedAssocs.delete(email);
    div.classList.remove('selected');
    div.querySelector('input').checked = false;
  } else {
    selectedAssocs.add(email);
    div.classList.add('selected');
    div.querySelector('input').checked = true;
  }
  updateMsTriggerText();
  renderTable();
}

function updateMsTriggerText() {
  var textEl  = document.getElementById('ms-trigger-text');
  var clearEl = document.getElementById('ms-clear');
  var n = selectedAssocs.size;
  if (n === 0) {
    textEl.textContent = 'All Associates';
    clearEl.style.display = 'none';
  } else if (n === 1) {
    var email = [...selectedAssocs][0];
    var rep   = repMap[email];
    textEl.textContent = rep ? rep.name : email;
    clearEl.style.display = 'inline';
  } else {
    textEl.textContent = n + ' associates selected';
    clearEl.style.display = 'inline';
  }
}

function clearAssocFilter(e) {
  e.stopPropagation();
  selectedAssocs.clear();
  updateMsTriggerText();
  filterMsOptions();
  renderTable();
}

// ── FILTER ───────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  ['all','acq','dispo'].forEach(function(x) {
    var btn = document.getElementById('f-' + x);
    btn.className = 'filter-btn' + (x === f ? ' active-' + f : '');
  });
  renderTable();
}

// ── RENDER TABLE ─────────────────────────────────────────────
function renderTable() {
  var sort = document.getElementById('sort-select').value;

  var classPick = document.getElementById('class-filter').value;

  var reps = Object.values(repMap).filter(function(rep) {
    if (currentFilter !== 'all' && rep.role !== currentFilter) return false;
    if (selectedAssocs.size > 0 && !selectedAssocs.has(rep.email)) return false;
    if (classPick === '__unassigned__' && (rep.cls || '').trim()) return false;
    if (classPick && classPick !== '__unassigned__' && (rep.cls || '').trim() !== classPick) return false;
    return true;
  });

  // Sort
  reps.sort(function(a, b) {
    if (sort === 'name') return a.name.localeCompare(b.name);
    var pctA = getCompPct(a), pctB = getCompPct(b);
    return sort === 'pct-desc' ? pctB - pctA : pctA - pctB;
  });

  document.getElementById('rep-count').textContent = reps.length + ' rep' + (reps.length !== 1 ? 's' : '');

  if (reps.length === 0) {
    document.getElementById('table-container').innerHTML =
      '<div class="state-msg">No reps found' + (allData.length === 0 ? ' — no data in sheet yet.' : '.') + '</div>';
    return;
  }

  // Determine which modules to show based on active filter
  var visibleMods = ALL_MODULES.filter(function(m) {
    if (currentFilter === 'acq')   return m.roles.includes('acq');
    if (currentFilter === 'dispo') return m.roles.includes('dispo');
    return true;
  });

  // Build header
  var thead = '<thead><tr><th class="rep-col">Associate</th><th class="prog-col">Progress</th>';
  visibleMods.forEach(function(m) {
    var cls = m.type === 'OLT' ? 'olt-header' : 'kc-header';
    thead += '<th class="mod-col ' + cls + '"><span class="mod-header-inner">' + m.name + '</span></th>';
  });
  thead += '</tr></thead>';

  // Build rows
  var tbody = '<tbody>';
  reps.forEach(function(rep) {
    var myMods = ALL_MODULES.filter(function(m) { return m.roles.includes(rep.role || 'acq'); });
    var compCount = myMods.filter(function(m) { return rep.completions[m.id] && rep.completions[m.id].passed; }).length;
    var pct = myMods.length > 0 ? Math.round((compCount / myMods.length) * 100) : 0;

    tbody += '<tr>';
    tbody += '<td class="rep-cell">';
    tbody += '<div class="rep-name">' + rep.name + '</div>';
    tbody += '<div class="rep-email">' + rep.email + '</div>';
    tbody += '<span class="rep-role ' + rep.role + '">' + (rep.role === 'acq' ? 'Acquisition' : 'Disposition') + '</span>';
    tbody += '</td>';

    // Progress bar
    tbody += '<td class="prog-cell">';
    tbody += '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:' + pct + '%"></div></div>';
    tbody += '<div class="prog-text">' + compCount + ' / ' + myMods.length + ' passed (' + pct + '%)</div>';
    tbody += '</td>';

    // Module cells
    visibleMods.forEach(function(m) {
      var c = rep.completions[m.id];
      // Only show cell if this module is relevant to rep's role
      if (!m.roles.includes(rep.role || 'acq')) {
        tbody += '<td class="mod-cell"><span class="cell-none" style="opacity:0.3">—</span></td>';
        return;
      }
      if (!c) {
        tbody += '<td class="mod-cell"><span class="cell-none">—</span></td>';
      } else if (c.passed) {
        tbody += '<td class="mod-cell"><span class="cell-pass"><span class="cell-score">' + Math.round(c.score_pct) + '%</span><span class="cell-check">✓ Pass</span></span></td>';
      } else {
        tbody += '<td class="mod-cell"><span class="cell-fail"><span class="cell-score">' + Math.round(c.score_pct) + '%</span><span class="cell-check">✗ Retry</span></span></td>';
      }
    });

    tbody += '</tr>';
  });
  tbody += '</tbody>';

  document.getElementById('table-container').innerHTML =
    '<table>' + thead + tbody + '</table>';
}

function getCompPct(rep) {
  var myMods = ALL_MODULES.filter(function(m) { return m.roles.includes(rep.role || 'acq'); });
  if (!myMods.length) return 0;
  var passed = myMods.filter(function(m) { return rep.completions[m.id] && rep.completions[m.id].passed; }).length;
  return Math.round((passed / myMods.length) * 100);
}



// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARV & Rehab — Rebuilt Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127968;</text></svg>">
  <style>
/* ========================================
   Rebuilt ARV Training Platform v3
   ======================================== */

:root {
  --primary: #29ABE2;
  --primary-hover: #1E96CA;
  --primary-light: #E0F4FC;
  --primary-dark: #1B7FA8;

  --gray-50: #F8FAFC;
  --gray-100: #F1F5F9;
  --gray-200: #E2E8F0;
  --gray-300: #CBD5E1;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1E293B;
  --gray-900: #0F172A;

  --grade-a: #22C55E;
  --grade-a-bg: #DCFCE7;
  --grade-b: #29ABE2;
  --grade-b-bg: #E0F4FC;
  --grade-c: #F59E0B;
  --grade-c-bg: #FEF3C7;
  --grade-d: #F97316;
  --grade-d-bg: #FFEDD5;
  --grade-f: #EF4444;
  --grade-f-bg: #FEE2E2;

  --pass: #22C55E;
  --fail: #EF4444;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
}

/* ---- Reset ---- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font);
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100vh;
}

/* ========================================
   Site Header
   ======================================== */
.site-header {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: .6rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: .5rem;
}
.header-brand {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gray-900);
  letter-spacing: -.02em;
}
/* ---- Main Navigation (Desktop Dropdowns) ---- */
.main-nav {
  display: flex;
  align-items: center;
  gap: .25rem;
}
.nav-dropdown {
  position: relative;
}
.nav-trigger {
  display: flex;
  align-items: center;
  gap: .35rem;
  padding: .45rem .85rem;
  background: none;
  border: 1px solid transparent;
  border-radius: var(--radius-sm, 6px);
  font-family: var(--font);
  font-size: .82rem;
  font-weight: 600;
  color: var(--gray-600);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.nav-trigger:hover {
  background: var(--gray-50);
  border-color: var(--gray-200);
  color: var(--gray-800);
}
.nav-trigger-active {
  color: var(--primary);
  background: var(--primary-light);
  border-color: var(--primary);
}
.nav-chevron {
  font-size: .6rem;
  transition: transform .2s;
}
.nav-dropdown-open .nav-chevron {
  transform: rotate(180deg);
}
.nav-panel {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 200px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  margin-top: 4px;
  padding: .4rem 0;
  z-index: 200;
}
.nav-dropdown-open .nav-panel {
  display: block;
}
.nav-group-label {
  padding: .4rem .85rem .2rem;
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--gray-400);
}
.nav-group-label:not(:first-child) {
  margin-top: .3rem;
  border-top: 1px solid var(--gray-100);
  padding-top: .5rem;
}
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: .5rem .85rem;
  background: none;
  border: none;
  font-family: var(--font);
  font-size: .85rem;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: background .12s;
  text-align: left;
}
.nav-item:hover {
  background: var(--gray-50);
  color: var(--gray-900);
}
.nav-item-active {
  color: var(--primary);
  font-weight: 600;
  background: var(--primary-light);
}
.nav-item-coming-soon {
  color: var(--gray-400);
}
.coming-soon-badge {
  font-size: .58rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  background: var(--gray-200);
  color: var(--gray-500);
  padding: .12rem .4rem;
  border-radius: 4px;
  margin-left: .5rem;
}

/* ---- Hamburger (mobile only) ---- */
.hamburger-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  width: 36px;
  height: 36px;
  background: none;
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  cursor: pointer;
  padding: 6px;
}
.hamburger-line {
  display: block;
  width: 100%;
  height: 2px;
  background: var(--gray-600);
  border-radius: 2px;
  transition: all .2s;
}
.hamburger-active .hamburger-line:nth-child(1) {
  transform: translateY(6px) rotate(45deg);
}
.hamburger-active .hamburger-line:nth-child(2) {
  opacity: 0;
}
.hamburger-active .hamburger-line:nth-child(3) {
  transform: translateY(-6px) rotate(-45deg);
}

/* ---- Mobile Nav Panel ---- */
.mobile-nav-panel {
  display: none;
  background: white;
  border-top: 1px solid var(--gray-200);
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.mobile-nav-panel.mobile-nav-open {
  max-height: 80vh;
  overflow-y: auto;
}
.mobile-nav-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: .85rem 1.25rem;
  background: none;
  border: none;
  border-bottom: 1px solid var(--gray-100);
  font-family: var(--font);
  font-size: .95rem;
  font-weight: 600;
  color: var(--gray-700);
  cursor: pointer;
}
.mobile-nav-trigger-active {
  color: var(--primary);
}
.mobile-nav-direct-btn {
  display: flex;
  align-items: center;
  width: 100%;
  padding: .85rem 1.25rem;
  background: none;
  border: none;
  border-bottom: 1px solid var(--gray-100);
  font-family: var(--font);
  font-size: .95rem;
  font-weight: 600;
  color: var(--gray-700);
  cursor: pointer;
}
.mobile-nav-direct-btn.mobile-nav-trigger-active {
  color: var(--primary);
}
.mobile-nav-items {
  display: none;
  padding: 0 0 .5rem;
  background: var(--gray-50);
}
.mobile-section-open .mobile-nav-items {
  display: block;
}
.mobile-nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: .65rem 1.25rem .65rem 2rem;
  background: none;
  border: none;
  font-family: var(--font);
  font-size: .88rem;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  text-align: left;
  border-bottom: 1px solid var(--gray-100);
}
.mobile-nav-item:hover {
  background: white;
}
.mobile-nav-item.nav-item-active {
  color: var(--primary);
  font-weight: 600;
}
.mobile-nav-item.nav-item-coming-soon {
  color: var(--gray-400);
}

/* ---- Materials Library ---- */
.materials-screen { max-width: 960px; margin: 0 auto; }
.materials-subtitle { color: var(--gray-500); margin-bottom: 2rem; font-size: 1.05rem; }
.materials-level-section { margin-bottom: 2.5rem; }
.materials-level-title { font-size: 1.3rem; margin-bottom: .2rem; }
.materials-level-sub { color: var(--gray-500); font-size: .9rem; margin-bottom: 1rem; }
.materials-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem;
}
.materials-card {
  background: white; border: 1px solid var(--gray-200); border-radius: 12px;
  overflow: hidden; cursor: pointer; transition: box-shadow .2s, transform .15s;
  box-shadow: var(--shadow);
}
.materials-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
.materials-thumb {
  position: relative; width: 100%; padding-top: 56.25%; background: var(--gray-100); overflow: hidden;
}
.materials-thumb img {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
}
.materials-play-icon {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 48px; height: 48px; background: rgba(0,0,0,.55); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 1.2rem; padding-left: 3px; transition: background .2s;
}
.materials-card:hover .materials-play-icon { background: var(--primary); }
.materials-info { padding: .85rem 1rem 1rem; }
.materials-video-title { font-size: .95rem; font-weight: 700; margin-bottom: .35rem; line-height: 1.3; }
.materials-video-desc { font-size: .8rem; color: var(--gray-500); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.materials-viewer-screen { max-width: 800px; margin: 0 auto; }
.materials-breadcrumb { color: var(--gray-500); font-size: .85rem; margin-bottom: .25rem; }
.materials-viewer-desc { margin-top: 1.5rem; padding: 1rem; background: var(--gray-50); border-radius: 8px; }
.materials-viewer-desc h3 { font-size: 1rem; margin-bottom: .35rem; }
.materials-viewer-desc p { color: var(--gray-500); font-size: .9rem; line-height: 1.5; }
.diploma-scores { font-size: .85rem; color: var(--gray-500); letter-spacing: .02em; }

/* ---- Coming Soon Screen ---- */
.coming-soon-screen {
  text-align: center;
  padding-top: 5rem;
  max-width: 480px;
  margin: 0 auto;
}
.coming-soon-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
}
.coming-soon-text {
  color: var(--gray-500);
  margin-bottom: 2rem;
  font-size: 1.05rem;
}

/* ---- Landing Page ---- */
.landing-screen {
  max-width: 1100px;
  margin: 0 auto;
  padding-top: 1rem;
}
.landing-hero {
  text-align: center;
  margin-bottom: 2.5rem;
}
.landing-hero h1 {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: .5rem;
}
.landing-subtitle {
  color: var(--gray-500);
  margin-bottom: 0;
  font-size: 1.05rem;
}
.landing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  text-align: left;
  margin-bottom: 3rem;
}
.landing-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, transform .15s;
}
.landing-card-clickable { cursor: pointer; }
.landing-card-clickable:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,.1);
  transform: translateY(-2px);
  border-color: var(--accent);
}
.landing-card-icon {
  font-size: 2rem;
  margin-bottom: .75rem;
}
.landing-card h2 {
  font-size: 1.1rem;
  margin-bottom: .5rem;
  color: var(--gray-900);
}
.landing-card-desc {
  font-size: .85rem;
  color: var(--gray-500);
  line-height: 1.4;
  margin: 0;
}
.landing-section-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 1rem;
}
.landing-training-section {
  border-top: 1px solid var(--gray-200);
  padding-top: 2rem;
}
.landing-training-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
  text-align: left;
}
.landing-training-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
}
.landing-training-card h3 {
  font-size: 1rem;
  margin-bottom: .75rem;
  color: var(--gray-900);
}
.landing-card-list {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: .85rem;
}
.landing-card-list li {
  padding: .4rem 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--gray-600);
  border-bottom: 1px solid var(--gray-100);
}
.landing-card-list li:last-child {
  border-bottom: none;
}
.landing-item-soon {
  color: var(--gray-400);
}
.landing-go-btn {
  font-size: .75rem;
  font-weight: 600;
  color: var(--primary);
  background: var(--primary-light);
  border: 1px solid var(--primary);
  padding: .2rem .6rem;
  border-radius: 999px;
  cursor: pointer;
  transition: all .15s;
}
.landing-go-btn:hover {
  background: var(--primary);
  color: white;
}

/* ---- Sales Training ---- */
.sales-dash-screen {
  max-width: 820px;
  margin: 0 auto;
}
.sales-dash-header {
  text-align: center;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 2px solid var(--gray-100);
}
.sales-dash-icon {
  font-size: 3rem;
  display: block;
  margin-bottom: .5rem;
}
.sales-dash-header h1 {
  margin-bottom: .25rem;
}
.sales-dash-subtitle {
  color: var(--gray-500);
  font-size: 1.05rem;
}
.sales-module-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  margin-bottom: 2rem;
}
.sales-module-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
}
.sales-module-num {
  font-size: .75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--primary);
  margin-bottom: .5rem;
}
.sales-module-card h3 {
  font-size: 1rem;
  margin-bottom: .5rem;
  color: var(--gray-900);
}
.sales-module-card p {
  font-size: .82rem;
  color: var(--gray-500);
  line-height: 1.4;
  flex: 1;
}
.sales-module-status {
  font-size: .78rem;
  color: var(--gray-400);
  margin: .75rem 0 .5rem;
  padding-top: .5rem;
  border-top: 1px solid var(--gray-100);
}
.sales-mod-btn {
  width: 100%;
  font-size: .85rem;
  padding: .5rem;
}
.sales-mod-btn.completed {
  background: #059669;
  border-color: #059669;
}
.sales-mod-btn.completed:hover {
  background: #047857;
}

/* Quiz section on level dash */
.sales-quiz-section {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.sales-quiz-section h2 {
  margin-bottom: .75rem;
}
.sales-quiz-score {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: .75rem;
}
.sales-quiz-score.passed { color: #059669; }
.sales-quiz-score.failed { color: #dc2626; }
.sales-quiz-locked {
  color: var(--gray-400);
  font-size: .9rem;
  margin-bottom: .75rem;
}
.sales-quiz-btn {
  font-size: .95rem;
  padding: .6rem 2rem;
}
.btn-disabled {
  opacity: .5;
  cursor: not-allowed !important;
}
.sales-next-btn {
  display: block;
  margin: 1rem auto 0;
  font-size: .95rem;
  padding: .6rem 2rem;
  background: #059669;
  border-color: #059669;
}
.sales-next-btn:hover {
  background: #047857;
}
.sales-back-btn {
  display: block;
  margin: .75rem auto 0;
}

/* Module screen */
.sales-module-screen {
  max-width: 820px;
  margin: 0 auto;
}
.sales-module-screen h1 {
  margin-bottom: .25rem;
}
.sales-module-desc {
  color: var(--gray-500);
  margin-bottom: 1.5rem;
  font-size: 1rem;
  line-height: 1.5;
}
.sales-video-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  margin-bottom: 1.25rem;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.sales-video-card.watched {
  border-color: #059669;
}
.sales-video-title {
  padding: .75rem 1rem;
  font-weight: 600;
  font-size: .95rem;
  background: var(--gray-50);
  border-bottom: 1px solid var(--gray-200);
}
.sales-video-wrapper {
  position: relative;
  padding-bottom: 56.25%; /* 16:9 */
  height: 0;
  overflow: hidden;
}
.sales-video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
/* Video timer countdown */
.video-timer {
  text-align: center;
  padding: .75rem 1rem;
  font-size: .95rem;
  font-weight: 600;
  color: var(--primary);
  background: #eff6ff;
  border-radius: 0 0 12px 12px;
  letter-spacing: .02em;
}

/* Admin quick-skip row */
.video-admin-row {
  display: flex;
  justify-content: flex-end;
  padding: .5rem 1rem;
}
.sales-admin-skip-btn {
  font-size: .8rem;
  padding: .35rem .75rem;
  background: #7c3aed;
  border-color: #7c3aed;
}
.sales-admin-skip-btn:hover {
  background: #6d28d9;
}

/* Video check questions section */
.video-check-section {
  padding: 1rem;
  border-top: 2px dashed var(--gray-200);
  margin-top: .5rem;
  animation: checkFadeIn .4s ease;
}
.video-check-section.check-visible {
  animation: checkFadeIn .4s ease;
}
@keyframes checkFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.video-check-heading {
  font-size: 1rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: .75rem;
}
.video-check-form {
  display: flex;
  flex-direction: column;
  gap: .75rem;
}
.video-check-q {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: .75rem 1rem;
  transition: border-color .2s, background .2s;
}
.video-check-q.correct {
  background: #ecfdf5;
  border-color: #a7f3d0;
}
.video-check-q.incorrect {
  background: #fef2f2;
  border-color: #fecaca;
}
.video-check-q-text {
  font-weight: 600;
  font-size: .9rem;
  color: var(--gray-800);
  margin-bottom: .5rem;
  line-height: 1.4;
}
.video-check-opts {
  display: flex;
  flex-direction: column;
  gap: .3rem;
}
.video-check-opt {
  display: flex;
  align-items: flex-start;
  gap: .5rem;
  padding: .3rem .4rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: .85rem;
  color: var(--gray-700);
  line-height: 1.4;
  transition: background .15s;
}
.video-check-opt:hover {
  background: rgba(0,0,0,.04);
}
.video-check-opt input[type="radio"] {
  margin-top: .2rem;
  flex-shrink: 0;
}
.video-check-opt.admin-highlight-correct {
  background: #dcfce7;
  border-radius: 6px;
  font-weight: 600;
}
.video-check-feedback {
  font-size: .85rem;
  font-weight: 600;
  margin-top: .4rem;
  min-height: 1.2em;
}
.video-check-feedback.correct {
  color: #059669;
}
.video-check-feedback.incorrect {
  color: #dc2626;
}
.video-check-submit {
  margin-top: .75rem;
  width: 100%;
  font-size: .95rem;
  padding: .6rem;
}
.video-check-submit.check-passed {
  background: #059669;
  border-color: #059669;
}

/* Admin answer banner (reused from ARV) */
.video-check-section .admin-answer-banner {
  background: #f5f3ff;
  border: 1px solid #c4b5fd;
  border-radius: 8px;
  padding: .5rem .75rem;
  font-size: .8rem;
  color: #6d28d9;
  font-weight: 600;
  margin-bottom: .75rem;
  text-align: center;
}

/* Quiz screen */
.sales-quiz-screen {
  max-width: 700px;
  margin: 0 auto;
}
.sales-quiz-form {
  margin: 1.5rem 0;
}
.sales-quiz-question {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}
.sales-quiz-q-text {
  font-weight: 600;
  margin-bottom: .75rem;
  color: var(--gray-900);
  line-height: 1.4;
}
.sales-quiz-options {
  display: flex;
  flex-direction: column;
  gap: .4rem;
}
.sales-quiz-option {
  display: flex;
  align-items: flex-start;
  gap: .5rem;
  padding: .4rem .5rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: .9rem;
  color: var(--gray-700);
  line-height: 1.4;
  transition: background .15s;
}
.sales-quiz-option:hover {
  background: var(--gray-50);
}
.sales-quiz-option input[type="radio"] {
  margin-top: .25rem;
  flex-shrink: 0;
}
.sales-quiz-submit {
  display: block;
  width: 100%;
  font-size: 1.05rem;
  padding: .75rem;
  margin-bottom: 2rem;
}

/* Results screen */
.sales-results-screen {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
}
.sales-results-score {
  font-size: 3rem;
  font-weight: 800;
  margin: .5rem 0 1rem;
}
.sales-results-score.passed { color: #059669; }
.sales-results-score.failed { color: #dc2626; }
.sales-results-review {
  text-align: left;
  margin: 2rem 0;
}
.sales-result-item {
  padding: .75rem 1rem;
  border-radius: 8px;
  margin-bottom: .5rem;
}
.sales-result-item.correct {
  background: #ecfdf5;
  border: 1px solid #a7f3d0;
}
.sales-result-item.incorrect {
  background: #fef2f2;
  border: 1px solid #fecaca;
}
.sales-result-q {
  font-weight: 600;
  font-size: .9rem;
  line-height: 1.4;
}
.sales-result-answer {
  font-size: .82rem;
  color: #059669;
  margin-top: .25rem;
  font-style: italic;
}

/* ========================================
   #app container
   ======================================== */
#app {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
}

/* ========================================
   Shared screen + animations
   ======================================== */
.screen { animation: fadeIn .35s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ========================================
   Buttons
   ======================================== */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  padding: .85rem 2.25rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  margin-top: .5rem;
}
.btn-primary:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-primary:active { transform: translateY(0); }

.btn-large { padding: 1rem 3rem; font-size: 1.15rem; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .6rem 1.25rem;
  background: white;
  color: var(--gray-600);
  border: 1px solid var(--gray-300);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: .9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  margin-top: .5rem;
}
.btn-secondary:hover {
  background: var(--gray-50);
  border-color: var(--gray-400);
  color: var(--gray-800);
}

.btn-row {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1.5rem;
}

/* ========================================
   Sign-In Screen
   ======================================== */
.signin-screen {
  text-align: center;
  padding-top: 4rem;
  max-width: 420px;
  margin: 0 auto;
}
.signin-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
}
.signin-screen h1 {
  font-size: 2rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: .5rem;
}
.signin-subtitle {
  color: var(--gray-500);
  font-size: 1rem;
  margin-bottom: 2rem;
  line-height: 1.5;
}
.signin-form {
  text-align: left;
}
.signin-label {
  display: block;
  font-size: .8rem;
  font-weight: 600;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: .4rem;
}
.signin-input {
  width: 100%;
  padding: .85rem 1rem;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 1.1rem;
  color: var(--gray-900);
  transition: border-color .2s;
}
.signin-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.signin-input::placeholder { color: var(--gray-300); }
.signin-error {
  color: var(--fail);
  font-size: .85rem;
  margin-top: .4rem;
}
.signin-form .btn-primary {
  width: 100%;
  margin-top: 1.25rem;
}

/* ========================================
   Presentation Screen
   ======================================== */
.pres-screen {
  max-width: 720px;
  margin: 0 auto;
}
.pres-progress {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 1.25rem;
}
.pres-counter {
  font-size: .8rem;
  font-weight: 600;
  color: var(--gray-500);
  white-space: nowrap;
}
.pres-bar {
  flex: 1;
  height: 4px;
  background: var(--gray-200);
  border-radius: 999px;
  overflow: hidden;
}
.pres-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 999px;
  transition: width .4s ease;
}
.pres-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 2rem 2.5rem;
  box-shadow: var(--shadow-md);
  min-height: 340px;
}
.pres-title {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: .5rem;
  line-height: 1.2;
}
.pres-title-slide .pres-title {
  font-size: 2.25rem;
  text-align: center;
  margin-bottom: .75rem;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.pres-subtitle {
  font-size: 1rem;
  color: var(--gray-500);
  margin-bottom: 1rem;
}
.pres-title-slide .pres-subtitle {
  text-align: center;
  font-size: 1.1rem;
}
.pres-body {
  font-size: .95rem;
  color: var(--gray-700);
  margin-bottom: 1rem;
  line-height: 1.6;
}
.pres-quote {
  background: var(--gray-50);
  border-left: 4px solid var(--primary);
  padding: 1rem 1.25rem;
  font-size: 1rem;
  font-style: italic;
  color: var(--gray-700);
  margin: 1rem 0;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.pres-bullets {
  list-style: none;
  margin: 1rem 0;
}
.pres-bullets li {
  position: relative;
  padding-left: 1.5rem;
  margin-bottom: .6rem;
  color: var(--gray-700);
  font-size: .95rem;
}
.pres-bullets li::before {
  content: '\2713';
  position: absolute;
  left: 0;
  color: var(--primary);
  font-weight: 700;
}
.pres-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin: 1rem 0;
}
.pres-col h3 {
  font-size: .9rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: .5rem;
  text-transform: uppercase;
  letter-spacing: .03em;
}
.pres-col ul {
  list-style: disc;
  padding-left: 1.25rem;
}
.pres-col li {
  font-size: .9rem;
  color: var(--gray-600);
  margin-bottom: .3rem;
}
.pres-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1rem;
  margin: 1.25rem 0;
}
.pres-grid-cell {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 1rem;
  text-align: center;
}
.pres-grid-big {
  font-size: 2rem;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}
.pres-grid-label {
  font-size: .8rem;
  font-weight: 700;
  color: var(--gray-800);
  text-transform: uppercase;
  letter-spacing: .03em;
  margin-top: .25rem;
}
.pres-grid-desc {
  font-size: .8rem;
  color: var(--gray-500);
  margin-top: .35rem;
  line-height: 1.4;
}
.pres-table {
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin: 1rem 0;
}
.pres-table-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  border-bottom: 1px solid var(--gray-100);
  font-size: .85rem;
}
.pres-table-row:last-child { border-bottom: none; }
.pres-table-header {
  background: var(--gray-50);
  font-weight: 700;
  color: var(--gray-600);
  text-transform: uppercase;
  font-size: .7rem;
  letter-spacing: .03em;
}
.pres-table-cell {
  padding: .6rem .75rem;
  color: var(--gray-700);
}
.pres-footer {
  margin-top: 1.25rem;
  padding-top: .75rem;
  border-top: 1px solid var(--gray-100);
  font-size: .85rem;
  color: var(--gray-500);
  font-weight: 500;
}
.pres-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
}

/* ========================================
   Dashboard Screen
   ======================================== */
.dashboard-screen {
  text-align: center;
}
.dash-banner {
  padding: 2rem 0 1.5rem;
}
.dash-level-emoji {
  font-size: 3rem;
  margin-bottom: .5rem;
}
.dash-level-name {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: .25rem;
}
.dash-level-sub {
  color: var(--gray-500);
  font-size: .95rem;
}

/* Progress segments */
.dash-progress {
  display: flex;
  gap: 4px;
  margin: 1.5rem auto 2rem;
  max-width: 600px;
}
.dash-progress-seg {
  flex: 1;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray-200);
  border-radius: 6px;
  font-size: .75rem;
  font-weight: 700;
  color: var(--gray-400);
  transition: all .3s;
}
.dash-progress-seg.seg-complete {
  background: var(--pass);
  color: white;
}
.dash-progress-seg.seg-current {
  background: var(--primary);
  color: white;
  transform: scale(1.05);
  box-shadow: 0 2px 8px rgba(41, 171, 226, .3);
}

/* Module cards */
.dash-modules {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: .75rem;
  margin-bottom: 1.5rem;
  text-align: center;
}
.dash-module-card {
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1rem .75rem;
  transition: all .2s;
  box-shadow: var(--shadow);
}
.dash-module-card:hover:not(.mod-locked) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--primary);
}
.mod-complete {
  border-color: var(--pass);
  background: linear-gradient(135deg, white, var(--grade-a-bg));
}
.mod-current {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.mod-locked {
  opacity: .5;
  cursor: default !important;
}
.mod-icon {
  font-size: 1.5rem;
  margin-bottom: .3rem;
}
.mod-number {
  font-size: .85rem;
  font-weight: 700;
  color: var(--gray-800);
}
.mod-questions {
  font-size: .75rem;
  color: var(--gray-400);
  margin-bottom: .4rem;
}
.mod-status {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  padding: .2rem .5rem;
  border-radius: 999px;
  display: inline-block;
}
.mod-status-pass { background: var(--grade-a-bg); color: var(--pass); }
.mod-status-ready { background: var(--primary-light); color: var(--primary); }
.mod-status-locked { background: var(--gray-100); color: var(--gray-400); }
.mod-status-retake { background: var(--primary-light); color: var(--primary); }

/* Grade display on module cards */
.mod-grade {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .2rem;
  margin: .3rem 0;
}
.mod-grade .grade-badge {
  font-size: 1rem;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-weight: 800;
}
.mod-grade-detail {
  font-size: .6rem;
  color: var(--gray-400);
}

/* Section titles for Practice / Test Out */
/* Section wrappers */
.dash-section {
  margin: 1.5rem 0;
  padding: 1rem;
  border-radius: var(--radius-lg, 12px);
  border: 2px solid var(--gray-200);
}
.dash-section-practice-wrap {
  background: linear-gradient(135deg, #EBF5FF 0%, #F0F7FF 100%);
  border-color: var(--primary-light);
}
.dash-section-testout-wrap {
  background: linear-gradient(135deg, #F5F0FF 0%, #FAF5FF 100%);
  border-color: #EDE9FE;
}
.dash-section-title {
  font-size: 1.25rem;
  font-weight: 800;
  margin: 0 0 .25rem;
  padding-bottom: .25rem;
  border-bottom: 2px solid var(--gray-200);
}
.dash-section-practice { color: var(--primary); border-color: var(--primary-light); }
.dash-section-testout { color: #7C3AED; border-color: #EDE9FE; }
.dash-section-prospect-wrap {
  background: linear-gradient(135deg, #F0FDF4 0%, #F5FFF8 100%);
  border-color: #BBF7D0;
}
.dash-section-prospect { color: #16A34A; border-color: #BBF7D0; }
.dash-prospect-search { max-width: 100%; }
.dash-section-prospect-wrap .prospect-results-table { font-size: 14px; }
.dash-section-prospect-wrap .prospect-result-row { grid-template-columns: 2fr 1fr 80px 80px 80px 80px 60px; }
.dash-section-prospect-wrap .prospect-empty,
.dash-section-prospect-wrap .prospect-loading { padding: 16px; text-align: center; color: var(--gray-400); }
.dash-section-desc {
  font-size: .8rem;
  color: var(--gray-500);
  margin-bottom: .75rem;
}

/* Test out card accent */
.mod-testout {
  border-left: 3px solid #7C3AED;
}
.mod-testout:hover {
  border-color: #7C3AED;
}

/* Timer */
.question-timer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
  padding: .5rem 1rem;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gray-700);
  margin-bottom: .75rem;
  font-variant-numeric: tabular-nums;
  position: sticky;
  top: 57px;
  z-index: 90;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.timer-icon { font-size: 1.2rem; }
.timer-warning {
  background: var(--grade-f-bg);
  border-color: var(--fail);
  color: var(--fail);
  animation: timer-pulse 1s ease-in-out infinite;
}
@keyframes timer-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* Module summary grade badge */
.badge-grade {
  font-size: 2rem;
  font-weight: 900;
  color: white;
}
.badge-grade.grade-a { background: var(--grade-a); }
.badge-grade.grade-b { background: var(--grade-b); }
.badge-grade.grade-c { background: var(--grade-c); }
.badge-grade.grade-d { background: var(--grade-d); }
.badge-grade.grade-f { background: var(--grade-f); }

.dash-criteria {
  max-width: 500px;
  margin: 0 auto;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: .75rem 1rem;
  font-size: .85rem;
  color: var(--gray-500);
}

/* ========================================
   Loading / Error
   ======================================== */
.loading-screen {
  text-align: center;
  padding-top: 6rem;
  color: var(--gray-500);
}
.loading-spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--gray-200);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-screen {
  text-align: center;
  padding-top: 5rem;
}
.error-screen h2 {
  font-size: 1.5rem;
  color: var(--gray-900);
  margin-bottom: .5rem;
}
.error-message {
  color: #DC2626;
  margin-bottom: 1.5rem;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}

/* ========================================
   Score tracker + progress bar
   ======================================== */
.score-tracker {
  display: flex;
  gap: 1.25rem;
  justify-content: center;
  flex-wrap: wrap;
  font-size: .85rem;
  color: var(--gray-500);
  margin-bottom: 1rem;
  padding: .6rem 1rem;
  background: white;
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200);
  box-shadow: var(--shadow);
}
.score-tracker span { white-space: nowrap; }

.progress-bar {
  background: var(--gray-200);
  border-radius: 999px;
  height: 6px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.progress-fill {
  background: var(--primary);
  height: 100%;
  border-radius: 999px;
  transition: width .45s ease;
}

/* ========================================
   Property card (quiz question)
   ======================================== */
.property-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 1.5rem;
}

/* ========================================
   Photo Carousel
   ======================================== */
.carousel {
  position: relative;
  width: 100%;
  background: var(--gray-900);
}
.carousel-viewport {
  position: relative;
  width: 100%;
  height: 360px;
  overflow: hidden;
  cursor: grab;
}
.carousel-image {
  width: 100%;
  height: 360px;
  object-fit: cover;
  display: block;
  background: var(--gray-100);
  transition: opacity .2s ease;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;            /* let clicks pass through to buttons */
  position: relative;
  z-index: 0;
}

/* MORE PROMINENT carousel buttons */
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 52px;
  border: none;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.6);
  color: white;
  font-size: 2rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, box-shadow .15s;
  z-index: 3;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  pointer-events: auto;            /* ensure clicks always register */
  -moz-appearance: none;
  -webkit-appearance: none;
  appearance: none;
  padding: 0;
}
.carousel-btn:hover {
  background: rgba(41, 171, 226, 0.85);
  box-shadow: 0 4px 16px rgba(41, 171, 226, .4);
}
.carousel-btn:active {
  background: rgba(41, 171, 226, 1);
}
.carousel-prev { left: 12px; }
.carousel-next { right: 12px; }

.carousel-counter {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0, 0, 0, 0.55);
  color: white;
  font-size: .75rem;
  font-weight: 600;
  padding: .25rem .6rem;
  border-radius: 999px;
  z-index: 3;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  pointer-events: none;
}

/* Thumbnail strip */
.carousel-thumbs {
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  background: var(--gray-900);
  overflow-x: auto;
  scroll-behavior: smooth;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.carousel-thumbs::-webkit-scrollbar { display: none; }

.thumb-img {
  width: 64px;
  height: 48px;
  object-fit: cover;
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  opacity: .5;
  border: 2px solid transparent;
  transition: opacity .2s, border-color .2s;
}
.thumb-img:hover {
  opacity: .8;
}
.thumb-img.thumb-active {
  opacity: 1;
  border-color: var(--primary);
}

.property-address {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--gray-900);
  padding: 1rem 1.25rem .5rem;
}

.property-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: .5rem;
  padding: .5rem 1.25rem 1.25rem;
}
.stat-item {
  display: flex;
  flex-direction: column;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  padding: .6rem .75rem;
  text-align: center;
}
.stat-label {
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--gray-400);
  font-weight: 600;
}
.stat-value {
  font-size: .95rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-top: .1rem;
}
/* Research links */
.research-links {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .75rem 1.25rem 1rem;
  flex-wrap: wrap;
}
.research-label {
  font-size: .8rem;
  font-weight: 600;
  color: var(--gray-500);
}
.research-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .45rem 1rem;
  border-radius: var(--radius);
  font-size: .8rem;
  font-weight: 600;
  text-decoration: none;
  transition: all .2s;
}
.research-zillow {
  background: #006aff;
  color: #fff;
}
.research-zillow:hover {
  background: #0051cc;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0, 106, 255, .35);
}
.research-hc {
  background: #1a1a2e;
  color: #fff;
}
.research-hc:hover {
  background: #0f0f1f;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(26, 26, 46, .35);
}
.research-sv {
  background: #34A853;
  color: #fff;
}
.research-sv:hover {
  background: #2D8E47;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(52, 168, 83, .35);
}

/* Embedded map */
.property-map {
  width: 100%;
  height: 200px;
  border: none;
  border-top: 1px solid var(--gray-200);
}

.stat-threshold {
  font-size: .7rem;
  font-weight: 600;
  margin-top: .2rem;
}
.stat-pass { border: 1px solid var(--pass); background: var(--grade-a-bg); }
.stat-fail { border: 1px solid var(--fail); background: var(--grade-f-bg); }

/* ========================================
   Estimate form
   ======================================== */
.estimate-form {
  background: white;
  border: 2px solid var(--primary);
  border-radius: var(--radius);
  padding: 1.5rem;
  box-shadow: var(--shadow);
}
.estimate-form .input-group { margin-bottom: 1rem; }
.estimate-form label {
  display: block;
  font-size: .85rem;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: .35rem;
}
.estimate-form input[type="text"] {
  width: 100%;
  padding: .75rem 1rem;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--gray-900);
  transition: border-color .2s;
}
.estimate-form input[type="text"]:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.estimate-form input[type="text"]::placeholder {
  color: var(--gray-300);
  font-weight: 400;
}

/* ========================================
   Grade Selector (multiple-choice)
   ======================================== */
.grade-selector-group {
  margin-bottom: 1.25rem;
}
.grade-selector-group > label {
  display: block;
  font-size: .85rem;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: .5rem;
}
.grade-options {
  display: flex;
  gap: .5rem;
  flex-wrap: wrap;
}
.grade-option {
  flex: 1;
  min-width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .25rem;
  padding: .75rem .5rem;
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
}
.grade-option:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.grade-option-selected {
  border-color: var(--primary) !important;
  background: var(--primary-light) !important;
  box-shadow: 0 0 0 3px rgba(41, 171, 226, .2);
  transform: translateY(-2px);
}
.grade-option-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-weight: 800;
  font-size: 1rem;
  color: white;
}
.grade-option-label {
  font-size: .8rem;
  font-weight: 700;
  color: var(--gray-800);
}
.grade-option-desc {
  font-size: .7rem;
  color: var(--gray-400);
  text-align: center;
  line-height: 1.3;
}
.grade-option-range {
  font-size: .6rem;
  color: var(--gray-500);
  font-weight: 600;
  text-align: center;
  margin-top: .15rem;
}
.grade-select-error {
  color: var(--fail);
  font-size: .85rem;
  margin-top: .25rem;
  margin-bottom: .25rem;
}

/* Grade comparison result row */
.grade-comparison-row .comparison-cell {
  align-items: center;
  text-align: center;
}

/* Mini grade badges for breakdown table */
.mini-grade {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  font-weight: 800;
  font-size: .75rem;
  color: white;
}

.input-error {
  border-color: #EF4444 !important;
  box-shadow: 0 0 0 3px #FEE2E2 !important;
  animation: shake .35s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

/* ========================================
   Grade badge
   ======================================== */
.grade-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  font-weight: 800;
  font-size: 1.1rem;
  color: white;
  flex-shrink: 0;
}
.grade-a { background: var(--grade-a); }
.grade-b { background: var(--grade-b); }
.grade-c { background: var(--grade-c); }
.grade-d { background: var(--grade-d); }
.grade-f { background: var(--grade-f); }

/* ========================================
   Results screen
   ======================================== */
.results-screen {
  text-align: center;
}
.results-screen h2 {
  font-size: 1.1rem;
  color: var(--gray-700);
  margin-bottom: .75rem;
  font-weight: 600;
}

.result-comparison {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
  text-align: left;
  box-shadow: var(--shadow);
}
.result-comparison h3 {
  font-size: .85rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--gray-500);
  margin-bottom: .75rem;
  font-weight: 700;
}

.comparison-row {
  display: flex;
  flex-wrap: wrap;
  gap: .75rem;
  align-items: center;
}
.comparison-cell {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 100px;
}
.comp-label {
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--gray-400);
  font-weight: 600;
}
.comp-value {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--gray-800);
  margin-top: .15rem;
}
.text-good { color: var(--pass) !important; }
.text-bad  { color: var(--fail) !important; }

.answer-reveal {
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  padding: .75rem 1rem;
  margin-bottom: 1.5rem;
  font-size: .9rem;
  color: var(--gray-600);
  text-align: left;
}
.answer-reveal p { margin-bottom: .25rem; }

/* ========================================
   Module Summary Screen
   ======================================== */
.module-summary-screen {
  text-align: center;
}
.module-summary-screen h1 {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: 1rem;
}
.module-badge {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin: 0 auto .75rem;
}
.badge-pass { background: var(--grade-a-bg); }
.badge-fail { background: var(--grade-f-bg); }

.module-verdict {
  font-size: 1.5rem;
  font-weight: 800;
  margin-bottom: 1.5rem;
}

.module-stats {
  display: flex;
  justify-content: center;
  gap: 1.25rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.module-stats .stat-item {
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1rem 1.5rem;
  min-width: 180px;
  box-shadow: var(--shadow);
}
.module-summary-screen h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gray-800);
  margin: 1.5rem 0 .75rem;
  text-align: left;
}

/* ========================================
   Breakdown table
   ======================================== */
.breakdown-table {
  width: 100%;
  text-align: left;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 1.5rem;
}
.breakdown-row {
  display: grid;
  grid-template-columns: 2fr repeat(6, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--gray-100);
  font-size: .8rem;
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-header {
  background: var(--gray-50);
  font-weight: 700;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: .03em;
  font-size: .7rem;
}
.breakdown-cell {
  padding: .65rem .5rem;
  display: flex;
  align-items: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.breakdown-address {
  font-weight: 600;
  color: var(--gray-700);
}

/* ========================================
   Diploma Screen
   ======================================== */
.diploma-screen {
  text-align: center;
  padding-top: 1rem;
}
.diploma-frame {
  background: linear-gradient(135deg, #29ABE2, #1B7FA8, #29ABE2, #5BC4F0);
  border-radius: 16px;
  padding: 6px;
  box-shadow: 0 8px 32px rgba(41, 171, 226, .25);
  margin-bottom: 2rem;
}
.diploma-inner {
  background: white;
  border-radius: 12px;
  padding: 3rem 2.5rem;
  position: relative;
}
.diploma-top-accent {
  width: 60px;
  height: 4px;
  background: var(--primary);
  margin: 0 auto 1.5rem;
  border-radius: 999px;
}
.diploma-org {
  font-size: .85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .15em;
  color: var(--gray-400);
  margin-bottom: .5rem;
}
.diploma-title {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: 1rem;
}
.diploma-divider {
  width: 100px;
  height: 2px;
  background: var(--gray-200);
  margin: 1rem auto;
}
.diploma-awarded {
  font-size: .9rem;
  color: var(--gray-500);
  margin-bottom: .25rem;
}
.diploma-name {
  font-size: 2rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: .25rem;
}
.diploma-achievement {
  font-size: .9rem;
  color: var(--gray-500);
  margin-bottom: .25rem;
}
.diploma-program {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: .5rem;
}
.diploma-subtitle {
  font-size: .9rem;
  color: var(--gray-500);
  margin-bottom: .5rem;
}
.diploma-badge {
  font-size: 3.5rem;
  margin: .75rem 0 .5rem;
}
.diploma-level {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--pass);
  margin-bottom: .5rem;
}
.diploma-date {
  font-size: .85rem;
  color: var(--gray-500);
  margin-bottom: .15rem;
}
.diploma-email {
  font-size: .8rem;
  color: var(--gray-400);
}
.diploma-cta {
  background: var(--primary-light);
  border: 2px solid var(--primary);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}
.diploma-instruction {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: .25rem;
}
.diploma-subtext {
  font-size: .9rem;
  color: var(--gray-500);
}

/* ========================================
   Responsive
   ======================================== */
@media (max-width: 700px) {
  .main-nav { display: none; }
  .hamburger-btn { display: flex; }
  .mobile-nav-panel { display: block; }
  .landing-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
  .landing-training-grid { grid-template-columns: 1fr; gap: 1rem; }
  .landing-subtitle { font-size: .95rem; }
  .sales-module-grid { grid-template-columns: 1fr; gap: 1rem; }
  .sales-dash-icon { font-size: 2.5rem; }
  .sales-quiz-question { padding: .75rem; }

  #app { padding: 1rem .75rem 3rem; }

  .signin-screen { padding-top: 2rem; }
  .signin-screen h1 { font-size: 1.6rem; }

  .pres-card { padding: 1.25rem 1rem; min-height: auto; }
  .pres-title { font-size: 1.3rem; }
  .pres-title-slide .pres-title { font-size: 1.6rem; }
  .pres-columns { grid-template-columns: 1fr; gap: 1rem; }
  .pres-grid { grid-template-columns: 1fr 1fr; }

  .dash-level-name { font-size: 1.4rem; }
  .dash-modules { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .dash-progress-seg { height: 30px; font-size: .65rem; }

  .carousel-viewport,
  .carousel-image { height: 260px; }
  .carousel-btn { width: 44px; height: 44px; font-size: 1.6rem; }
  .thumb-img { width: 52px; height: 40px; }
  .property-stats { grid-template-columns: repeat(3, 1fr); }
  .property-map { height: 160px; }

  .comparison-row { flex-direction: column; gap: .4rem; }
  .comparison-cell { flex-direction: row; justify-content: space-between; min-width: 100%; }

  .module-stats { flex-direction: column; align-items: center; }
  .breakdown-table { overflow-x: auto; }
  .breakdown-row {
    grid-template-columns: 1.5fr repeat(6, minmax(55px, 1fr));
    min-width: 550px;
  }

  .diploma-inner { padding: 2rem 1.25rem; }
  .diploma-title { font-size: 1.3rem; }
  .diploma-name { font-size: 1.5rem; }

  .score-tracker { font-size: .78rem; gap: .75rem; }

  .grade-options { gap: .35rem; }
  .grade-option { min-width: 60px; padding: .6rem .35rem; }
  .grade-option-letter { width: 30px; height: 30px; font-size: .85rem; }
  .grade-option-label { font-size: .7rem; }
  .grade-option-desc { font-size: .6rem; }
  .grade-option-range { font-size: .55rem; }

  .comp-cards-row { flex-direction: column; }
  .comp-cards-row .comp-vs-divider { padding: 0; margin: .5rem 0; }
  .comp-cards-row .property-stats { grid-template-columns: repeat(3, 1fr); }
}

/* ========================================
   Dashboard Actions
   ======================================== */
.dash-actions {
  display: flex;
  justify-content: center;
  margin-top: 1rem;
  gap: .75rem;
}
.btn-small {
  font-size: .82rem;
  padding: .4rem 1rem;
}

/* ========================================
   History Screen
   ======================================== */
.history-screen {
  max-width: 900px;
  margin: 0 auto;
}
.history-subtitle {
  color: var(--gray-500);
  margin-bottom: 1.5rem;
}
.history-table-container {
  min-height: 200px;
}
.history-table {
  width: 100%;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  overflow: hidden;
}
.history-row {
  display: grid;
  grid-template-columns: 1.4fr 1.2fr .8fr .7fr .7fr .7fr;
  gap: 0;
  border-bottom: 1px solid var(--gray-100);
  align-items: center;
}
.history-header {
  background: var(--gray-50);
  font-weight: 700;
  font-size: .8rem;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: .03em;
}
.history-header .history-cell {
  padding: .6rem .75rem;
}
.history-cell {
  padding: .55rem .75rem;
  font-size: .85rem;
  color: var(--gray-700);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-pass {
  background: rgba(34, 197, 94, .03);
}
.history-fail {
  background: rgba(239, 68, 68, .03);
}
.history-row:last-child {
  border-bottom: none;
}
.history-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray-500);
}
.history-empty p:first-child {
  font-size: 1.3rem;
  margin-bottom: .5rem;
}
.history-empty-sub {
  font-size: .9rem;
  color: var(--gray-400);
}
.history-count {
  text-align: center;
  font-size: .8rem;
  color: var(--gray-400);
  margin-top: .75rem;
}

@media (max-width: 700px) {
  .history-row {
    grid-template-columns: 1fr 1fr .6fr .6fr .5fr .5fr;
    min-width: 500px;
  }
  .history-table-container {
    overflow-x: auto;
  }
}

/* ========================================
   Certification Status Screen
   ======================================== */
.cert-row {
  grid-template-columns: 1.3fr .55fr .55fr .55fr .55fr .55fr .55fr .55fr .55fr .55fr .65fr;
}
.cert-table-container {
  overflow-x: auto;
}
.cert-testout {
  background: rgba(251, 191, 36, .10);
}
.cert-header .cert-testout {
  background: rgba(251, 191, 36, .22);
  color: #92400e;
}
.cert-certified {
  background: rgba(251, 191, 36, .13);
}
.cert-certified .cert-testout {
  background: rgba(251, 191, 36, .22);
}
.cert-testout-label {
  display: block;
  font-size: .6rem;
  font-weight: 600;
  color: #b45309;
  letter-spacing: .04em;
  text-transform: uppercase;
  line-height: 1;
  margin-top: 2px;
}

/* Certification Name Filter */
.cert-filter-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.cert-filter-label {
  font-weight: 600;
  font-size: .9rem;
  white-space: nowrap;
}
.cert-filter-box {
  position: relative;
  min-width: 200px;
}
.cert-filter-toggle {
  width: 100%;
  padding: 8px 14px;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  background: #fff;
  font-size: .88rem;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color .15s;
}
.cert-filter-toggle:hover,
.cert-filter-toggle-open {
  border-color: var(--primary);
}
.cert-filter-arrow {
  font-size: .7rem;
  margin-left: 8px;
  transition: transform .15s;
}
.cert-filter-toggle-open .cert-filter-arrow {
  transform: rotate(180deg);
}
.cert-filter-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #fff;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  z-index: 50;
  max-height: 260px;
  overflow: hidden;
  flex-direction: column;
}
.cert-filter-dropdown-open {
  display: flex;
}
.cert-filter-actions {
  display: flex;
  gap: 6px;
  padding: 8px 10px 6px;
  border-bottom: 1px solid #e5e7eb;
}
.cert-filter-action-btn {
  font-size: .78rem;
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid #d1d5db;
  background: #f9fafb;
  cursor: pointer;
  font-weight: 500;
  transition: background .12s;
}
.cert-filter-action-btn:hover {
  background: #e5e7eb;
}
.cert-filter-list {
  overflow-y: auto;
  max-height: 210px;
  padding: 4px 0;
}
.cert-filter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: .87rem;
  transition: background .1s;
}
.cert-filter-item:hover {
  background: #f3f4f6;
}
.cert-filter-item input[type="checkbox"] {
  accent-color: var(--primary);
  width: 15px;
  height: 15px;
  cursor: pointer;
}

/* ========================================
   Leaderboard Screen
   ======================================== */
.leaderboard-header {
  grid-template-columns: .5fr 1.4fr .7fr .7fr .7fr .7fr .7fr;
}
.leaderboard-row {
  grid-template-columns: .5fr 1.4fr .7fr .7fr .7fr .7fr .7fr;
}
.leaderboard-top {
  background: linear-gradient(90deg, rgba(254, 243, 199, .25), transparent);
}
.leaderboard-top:nth-child(2) {
  background: linear-gradient(90deg, rgba(254, 240, 138, .35), transparent);
}
.leaderboard-rank {
  font-weight: 800;
  font-size: .95rem;
}
.leaderboard-name {
  font-weight: 700;
  color: var(--gray-800);
}
.leaderboard-overall {
  font-weight: 800;
  color: var(--primary);
}

@media (max-width: 700px) {
  .leaderboard-header,
  .leaderboard-row {
    grid-template-columns: .4fr 1.2fr .6fr .6fr .6fr .6fr .6fr;
    min-width: 560px;
  }
}

/* ========================================
   Comp Analysis Intro Module
   ======================================== */

/* Intro screen */
.comp-intro-screen {
  max-width: 680px;
  margin: 0 auto;
  text-align: center;
}
.comp-intro-screen h1 { margin-bottom: .25rem; }
.comp-intro-screen > p { color: var(--gray-500); margin-bottom: 1.5rem; }

/* 4-3-2-1 Rules recap */
.comp-rules-recap {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  text-align: left;
}
.comp-rules-recap h3 {
  font-size: .95rem;
  margin-bottom: .75rem;
  color: var(--gray-700);
}
.comp-rules-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .5rem;
}
.comp-rule-item {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: .85rem;
  color: var(--gray-600);
  padding: .4rem .6rem;
  background: white;
  border-radius: 6px;
  border: 1px solid var(--gray-200);
}
.comp-rule-item strong {
  color: var(--primary);
  font-size: 1rem;
  min-width: 1.5rem;
}

/* Subject & Comp property cards */
.comp-subject-card,
.comp-potential-card {
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: .75rem;
  text-align: left;
}
.comp-subject-card {
  background: rgba(41, 171, 226, .06);
  border: 2px solid var(--primary);
}
.comp-potential-card {
  background: rgba(245, 158, 11, .06);
  border: 2px solid #f59e0b;
}
.comp-card-badge {
  display: inline-block;
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: .2rem .6rem;
  border-radius: 4px;
  margin-bottom: .5rem;
  color: white;
  background: var(--primary);
}
.comp-badge-potential { background: #f59e0b; }
.comp-card-address {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: .6rem;
}
.comp-card-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .4rem;
  font-size: .8rem;
}
.comp-card-stats span {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 4px;
  padding: .3rem .4rem;
  text-align: center;
}
.comp-card-stats strong {
  display: block;
  font-size: .7rem;
  color: var(--gray-400);
  text-transform: uppercase;
  margin-bottom: .15rem;
}
.comp-sale-info {
  margin-top: .6rem;
  font-size: .85rem;
  color: var(--gray-600);
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
.comp-active-badge {
  background: #ef4444;
  color: white;
  font-size: .7rem;
  font-weight: 700;
  padding: .15rem .5rem;
  border-radius: 4px;
  text-transform: uppercase;
}

/* VS divider */
.comp-vs-divider {
  text-align: center;
  font-size: .85rem;
  font-weight: 800;
  color: var(--gray-400);
  margin: .5rem 0;
  text-transform: uppercase;
  letter-spacing: .08em;
}

/* Side-by-side card layout */
.comp-cards-row {
  display: flex;
  align-items: stretch;
  gap: 0;
  margin-bottom: .75rem;
}
.comp-cards-row .comp-subject-card,
.comp-cards-row .comp-potential-card {
  flex: 1;
  min-width: 0;
  margin-bottom: 0;
}
.comp-cards-row .comp-vs-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 .5rem;
  margin: 0;
  flex-shrink: 0;
}
.comp-cards-row .property-stats {
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  padding: .5rem .75rem 1rem;
}

/* Admin answer highlighting */
.admin-answer-banner {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .5rem .75rem;
  margin: .75rem 0 .5rem;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 1px solid #f59e0b;
  border-radius: 6px;
  font-size: .8rem;
  font-weight: 600;
  color: #92400e;
}
.admin-answer-icon {
  font-size: 1rem;
}
.admin-highlight-correct {
  background: rgba(34, 197, 94, .12) !important;
  border-color: #22c55e !important;
  box-shadow: inset 3px 0 0 #22c55e;
}
.admin-highlight-good {
  background: rgba(34, 197, 94, .12) !important;
  border-color: #22c55e !important;
  color: #16a34a !important;
  box-shadow: inset 3px 0 0 #22c55e;
}

/* Issues form (checkboxes) */
.comp-issues-form {
  text-align: left;
  margin-top: 1rem;
}
.comp-issues-form h3 {
  font-size: .95rem;
  margin-bottom: .6rem;
  color: var(--gray-700);
}
.comp-checkbox-label {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .5rem .75rem;
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  margin-bottom: .35rem;
  cursor: pointer;
  font-size: .85rem;
  transition: background .15s, border-color .15s;
}
.comp-checkbox-label:hover {
  background: var(--gray-50);
  border-color: var(--gray-300);
}
.comp-checkbox-label input[type="checkbox"] {
  accent-color: var(--primary);
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* Good Comp toggle button */
.comp-good-btn {
  display: block;
  width: 100%;
  margin-top: .5rem;
  padding: .65rem 1rem;
  border: 2px dashed #22c55e;
  border-radius: 8px;
  background: transparent;
  color: #22c55e;
  font-weight: 700;
  font-size: .9rem;
  cursor: pointer;
  transition: all .15s;
}
.comp-good-btn:hover { background: rgba(34, 197, 94, .06); }
.comp-good-selected {
  background: #22c55e !important;
  color: white !important;
  border-style: solid;
}

/* Error text */
.comp-error {
  color: #ef4444;
  font-size: .8rem;
  margin-top: .5rem;
}

/* Scenario results */
.comp-result-item {
  text-align: left;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: .75rem;
}
.comp-result-good { border-left: 4px solid #22c55e; }
.comp-result-bad { border-left: 4px solid #ef4444; }
.comp-result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: .4rem;
}
.comp-result-header strong { font-size: .95rem; }
.comp-result-answer {
  font-size: .8rem;
  color: var(--gray-500);
  margin-bottom: .3rem;
}
.comp-result-issues {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem;
  margin-top: .3rem;
}
.comp-result-issue {
  font-size: .75rem;
  padding: .2rem .5rem;
  border-radius: 4px;
  background: var(--gray-100);
  color: var(--gray-600);
}
.comp-result-explain {
  font-size: .8rem;
  color: var(--gray-500);
  margin-top: .4rem;
  font-style: italic;
}

/* Dashboard intro card */
.comp-intro-card {
  border: 2px solid var(--primary) !important;
  background: rgba(41, 171, 226, .04) !important;
}

/* Scenario progress indicator */
.comp-progress {
  display: flex;
  justify-content: center;
  gap: .4rem;
  margin-bottom: 1rem;
}
.comp-progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--gray-200);
}
.comp-progress-dot.done { background: #22c55e; }
.comp-progress-dot.active { background: var(--primary); }

/* Responsive */
@media (max-width: 600px) {
  .comp-rules-grid { grid-template-columns: 1fr; }
  .comp-card-stats { grid-template-columns: repeat(2, 1fr); }
  .comp-subject-card,
  .comp-potential-card { padding: 1rem; }
}

/* ========================================
   Scrollbar
   ======================================== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--gray-100); }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

/* ========================================
   Performance Dashboard
   ======================================== */

.perf-loading {
  text-align: center;
  padding: 4rem 2rem;
  font-size: 1.125rem;
  color: var(--gray-500);
}

.perf-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.perf-header {
  margin-bottom: 1.5rem;
}
.perf-header h1 {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--gray-900);
  margin: 0 0 .25rem;
}
.perf-subtitle {
  font-size: 1rem;
  font-weight: 600;
  color: var(--primary-dark);
  margin: 0;
}
.perf-generated {
  font-size: .8rem;
  color: var(--gray-400);
  margin: .25rem 0 0;
}

/* Legend */
.perf-legend {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
  padding: .75rem 1rem;
  background: var(--gray-50);
  border-radius: .5rem;
  border: 1px solid var(--gray-200);
}
.perf-legend-spacer {
  flex: 1;
}
.perf-legend-label {
  font-size: .75rem;
  color: var(--gray-500);
}

/* MPS badges */
.mps-badge {
  display: inline-block;
  padding: .2rem .5rem;
  border-radius: .25rem;
  font-size: .75rem;
  font-weight: 600;
}
.mps-badge.mps-expert { background: #D9EAD3; color: #38761D; }
.mps-badge.mps-target { background: #FFF2CC; color: #7F6000; }
.mps-badge.mps-minimum { background: #FCE5CD; color: #B45309; }
.mps-badge.mps-below-minimum { background: #F4CCCC; color: #CC0000; }

/* Table */
.perf-table-wrap {
  overflow-x: auto;
  border-radius: .5rem;
  border: 1px solid var(--gray-200);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.perf-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .875rem;
}
.perf-table thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
.perf-table th {
  background: var(--gray-800);
  color: #fff;
  font-weight: 600;
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .03em;
  padding: .6rem .75rem;
  text-align: center;
  white-space: nowrap;
  border-bottom: 2px solid var(--gray-900);
}
.perf-table th:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  z-index: 3;
}
.perf-sortable {
  cursor: pointer;
  user-select: none;
}
.perf-sortable:hover {
  background: var(--gray-700);
}
.perf-table td {
  padding: .5rem .75rem;
  text-align: center;
  border-bottom: 1px solid var(--gray-100);
  white-space: nowrap;
}
.perf-table td:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 1;
}
.perf-table tbody tr {
  background: #fff;
  transition: background .15s;
}
.perf-table tbody tr:nth-child(even) {
  background: var(--gray-50);
}
.perf-table tbody tr:hover {
  background: var(--primary-light);
}
.perf-inactive-row {
  opacity: .5;
}
.perf-agent-name {
  font-weight: 600;
  color: var(--gray-800);
}

/* MPS cell coloring */
.mps-expert {
  background: #D9EAD3 !important;
  color: #38761D;
  font-weight: 700;
}
.mps-target {
  background: #FFF2CC !important;
  color: #7F6000;
}
.mps-minimum {
  background: #FCE5CD !important;
  color: #B45309;
}
.mps-below-minimum {
  background: #F4CCCC !important;
  color: #CC0000;
  font-weight: 700;
}

.perf-week-cell {
  font-size: .8rem;
  color: var(--gray-600);
}

/* Trend arrows */
.trend-up { color: #38761D; font-weight: 700; font-size: 1.1rem; }
.trend-down { color: #CC0000; font-weight: 700; font-size: 1.1rem; }
.trend-flat { color: var(--gray-400); font-size: 1.1rem; }

/* Summary stats */
.perf-stats {
  display: flex;
  gap: 1rem;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}
.perf-stat {
  flex: 1;
  min-width: 140px;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: .5rem;
  padding: 1rem 1.25rem;
  text-align: center;
}
.perf-stat-value {
  display: block;
  font-size: 2rem;
  font-weight: 800;
  color: var(--gray-900);
}
.perf-stat-label {
  display: block;
  font-size: .8rem;
  color: var(--gray-500);
  margin-top: .25rem;
}
.perf-stat-alert {
  border-color: #F4CCCC;
  background: #FEF2F2;
}
.perf-stat-alert .perf-stat-value {
  color: #CC0000;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .perf-container { padding: 1rem .75rem 3rem; }
  .perf-header h1 { font-size: 1.25rem; }
  .perf-legend { flex-direction: column; align-items: flex-start; }
  .perf-legend-spacer { display: none; }
  .perf-stats { flex-direction: column; }
  .perf-table { font-size: .75rem; }
  .perf-table th, .perf-table td { padding: .4rem .5rem; }
}

/* ========================================
   Prospect Lookup
   ======================================== */
.prospect-screen { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

/* Search */
.prospect-search-box { display: flex; gap: 12px; margin: 24px 0; max-width: 600px; }
.prospect-search-input {
  flex: 1; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 8px;
  font-size: 15px; font-family: inherit; transition: border-color 0.2s;
}
.prospect-search-input:focus { outline: none; border-color: var(--accent); }
.prospect-search-btn { white-space: nowrap; padding: 12px 24px; }
.prospect-loading { text-align: center; padding: 48px; color: var(--gray-400); font-size: 16px; }
.prospect-empty { text-align: center; padding: 48px; color: var(--gray-400); }

/* Search results table */
.prospect-results-table { border: 1px solid var(--gray-200); border-radius: 8px; overflow-x: auto; }
.prospect-result-row {
  display: grid; grid-template-columns: 56px 180px 100px 120px 70px 80px 80px 80px 110px 80px 80px 60px;
  gap: 6px; padding: 8px 12px; align-items: center; font-size: 13px;
  border-bottom: 1px solid var(--gray-100); white-space: nowrap; min-width: max-content;
}
.prospect-result-row:last-child { border-bottom: none; }
.prospect-result-header { background: var(--gray-50); font-weight: 600; color: var(--gray-500); font-size: 12px; text-transform: uppercase; }
.prospect-result-addr { font-weight: 500; white-space: normal; }
.prospect-result-thumb { width: 60px; min-width: 60px; padding: 4px; }
.prospect-thumb-img { width: 52px; height: 40px; object-fit: cover; border-radius: 4px; }
.prospect-result-row:not(.prospect-result-header):hover { background: #f0f9ff; cursor: pointer; }
.prospect-report-row {
  display: grid; grid-template-columns: 100px 140px 100px 100px 100px 100px 80px;
  gap: 6px; padding: 8px 12px; align-items: center; font-size: 13px;
  border-bottom: 1px solid var(--gray-100);
}
.prospect-report-row.prospect-report-row--history {
  grid-template-columns: 100px 1fr 160px 90px;
}
.prospect-report-row:last-child { border-bottom: none; }
.prospect-report-link {
  color: var(--accent); font-weight: 600; font-size: 12px; text-decoration: none;
}
.prospect-report-link:hover { text-decoration: underline; }
.prospect-view-btn { padding: 4px 12px; font-size: 12px; }
.prospect-status-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
  font-weight: 600; text-transform: uppercase;
}
.prospect-status-active { background: #c6f6d5; color: #276749; }
.prospect-status-dead { background: #fed7d7; color: #c53030; }
.prospect-status-new { background: #bee3f8; color: #2b6cb0; }

/* Header bar */
.prospect-header-bar {
  display: flex; align-items: center; gap: 16px; padding: 12px 16px;
  background: var(--gray-50); border-radius: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.prospect-back-link {
  background: none; border: none; color: var(--accent); font-size: 14px;
  cursor: pointer; font-weight: 500; padding: 4px 8px;
}
.prospect-back-link:hover { text-decoration: underline; }
.prospect-contact-info { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.prospect-contact-name { color: var(--accent); font-weight: 600; text-decoration: none; }
.prospect-contact-info span { color: var(--gray-600); font-size: 14px; }
.prospect-mailer-badge {
  margin-left: auto; background: #ebf8ff; color: #2b6cb0; padding: 6px 14px;
  border-radius: 6px; font-weight: 600; font-size: 14px; border: 1px solid #bee3f8;
}

/* Property bar */
.prospect-prop-bar {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px; border-bottom: 1px solid var(--gray-200); margin-bottom: 16px;
}
.prospect-address h2 { font-size: 18px; margin: 0 0 4px; color: var(--gray-800); }
.prospect-address p { margin: 0; color: var(--gray-500); font-size: 13px; }
.prospect-last-sale-line { font-size: 12px !important; color: var(--gray-400) !important; }
.prospect-deal-status {
  padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700;
  background: var(--gray-100); color: var(--gray-600); white-space: nowrap;
}

/* Main grid */
.prospect-main-grid { display: grid; grid-template-columns: 280px 1fr 320px; gap: 16px; }
@media (max-width: 1100px) {
  .prospect-main-grid { grid-template-columns: 1fr; }
}

/* Cards */
.prospect-card {
  background: white; border: 1px solid var(--gray-200); border-radius: 8px;
  padding: 16px; margin-bottom: 16px;
}
.prospect-card-title {
  font-size: 13px; font-weight: 700; color: var(--gray-700);
  text-transform: uppercase; margin: 0 0 12px; letter-spacing: 0.5px;
}
.prospect-card-subtitle { font-size: 12px; color: var(--gray-400); margin: -8px 0 12px; }

/* KV rows */
.prospect-kv-table { display: flex; flex-direction: column; gap: 8px; }
.prospect-kv-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 14px; }
.prospect-kv-label { color: var(--gray-500); }
.prospect-kv-value { font-weight: 600; color: var(--gray-800); }

/* Contact section */
.prospect-contact-section { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--gray-100); }
.prospect-contact-label { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; }
.prospect-contact-entry { margin-bottom: 4px; }
.prospect-contact-entry strong { color: var(--accent); }
.prospect-contact-type { color: var(--accent); font-size: 12px; margin-left: 4px; }

/* Financials */
.prospect-fin-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.prospect-fin-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
.prospect-fin-amount { font-size: 24px; font-weight: 700; color: var(--gray-800); }
.prospect-badge {
  padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.prospect-badge-green { background: #c6f6d5; color: #276749; }
.prospect-badge-red { background: #fed7d7; color: #c53030; }
.prospect-mort-bar {
  height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; margin-bottom: 4px;
}
.prospect-mort-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
.prospect-mort-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-400); }

/* Rent table */
.prospect-rent-table { font-size: 14px; }
.prospect-rent-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--gray-100); }
.prospect-rent-row:last-child { border-bottom: none; }
.prospect-rent-header { font-weight: 600; font-size: 12px; color: var(--gray-500); text-transform: uppercase; }

/* Pricing tables */
.prospect-section-label {
  font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase;
  letter-spacing: 0.5px; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--gray-100);
}
.prospect-pricing-table { font-size: 13px; margin-bottom: 8px; }
.prospect-pricing-row { display: grid; grid-template-columns: 1.5fr 1fr 0.8fr; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--gray-50); }
.prospect-pricing-header { font-weight: 600; font-size: 11px; color: var(--gray-500); text-transform: uppercase; }

/* Photo grid */
.prospect-photo-card { padding: 16px; }
.prospect-photo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}
.prospect-photo-wrap { border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; cursor: pointer; }
.prospect-photo {
  width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s;
}
.prospect-photo:hover { transform: scale(1.05); }

/* Lightbox */
.prospect-lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000;
  display: flex; align-items: center; justify-content: center;
}
.prospect-lb-img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }
.prospect-lb-close {
  position: absolute; top: 16px; right: 16px; background: none; border: none;
  color: white; font-size: 28px; cursor: pointer;
}
.prospect-lb-prev, .prospect-lb-next {
  position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2);
  border: none; color: white; font-size: 24px; padding: 12px 16px; border-radius: 8px; cursor: pointer;
}
.prospect-lb-prev { left: 16px; }
.prospect-lb-next { right: 16px; }
.prospect-lb-prev:hover, .prospect-lb-next:hover { background: rgba(255,255,255,0.3); }
.prospect-lb-counter { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: white; font-size: 14px; }

/* Offer calculation card */
.prospect-offer-card { background: white; }
.prospect-offer-header {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: 16px;
  border-radius: 8px; overflow: hidden;
}
.prospect-offer-box { padding: 16px; text-align: center; }
.prospect-offer-suggested { background: #1a365d; color: white; }
.prospect-offer-dispo { background: #2b6cb0; color: white; }
.prospect-offer-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; opacity: 0.8; margin-bottom: 4px; }
.prospect-offer-amount { font-size: 22px; font-weight: 800; }
.prospect-offer-psf { font-size: 11px; opacity: 0.7; margin-top: 2px; }

.prospect-offer-row { margin-bottom: 12px; }
.prospect-offer-field-label { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.prospect-offer-field-value { font-size: 16px; font-weight: 700; color: var(--gray-800); }
.prospect-offer-field-psf { font-size: 11px; color: var(--gray-400); }

/* Condition grade bar */
.prospect-grade-bar { display: flex; gap: 4px; margin: 8px 0; }
.prospect-grade-btn {

}
.prospect-grade-active { background: #1a365d; border-color: #1a365d; }
.prospect-grade-active .prospect-grade-letter { color: white; }
.prospect-grade-active .prospect-grade-cost { color: rgba(255,255,255,0.8); }
.prospect-grade-letter { font-size: 16px; font-weight: 800; color: var(--gray-600); }
.prospect-grade-cost { font-size: 10px; color: var(--gray-400); }
.prospect-condition-desc { font-size: 12px; color: var(--gray-500); font-style: italic; }

.prospect-uw-notes {

.prospect-uw-notes h4 { font-size: 12px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; margin: 0 0 8px; }
.prospect-uw-notes p { font-size: 13px; color: var(--gray-600); line-height: 1.5; margin: 0; }

.prospect-price-reduction-btn:hover { background: #22543d; }

.prospect-modal-overlay {

.pr-current-section { background: var(--gray-50); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
.pr-current-section h4 { margin: 0 0 8px; font-size: 13px; color: var(--gray-500); text-transform: uppercase; }
